const NPCS={
  prompter:{
    name:'Miss Quill',
    rooms:['prompt_corner'],
    examine:`Miss Quill, the prompter: a small, still, grey woman of indeterminate age who has whispered the right word into the silence after a hundred dried-up actors and never once been thanked aloud. She knows this play, and every play, and most of the people, better than they know themselves. She speaks, always, in the low carrying murmur of the prompt corner, which means even her smallest remark sounds like a secret.`,
    greet:[
      `Miss Quill does not look up from the prompt copy. "You'll be going on, then," she murmurs - not a question. "Three seasons you've waited. Funny how it always comes like this: not with a clean swap, but with the whole building on fire." She turns a page. "You know the first two acts. It's Act Three that'll sink you - and your copy's a tea-stain, I'd put money on it." She is, of course, exactly right.`,
      `"There's one whole Act Three in this theatre that isn't ruined," Miss Quill whispers, "and that's the Director's Book. The master copy. He's upstairs, clutching it like a drowning man clutches the man trying to save him." A pause. "He won't give it up while he thinks the night's already lost. Give him a reason to hope, and he'll hand it over - he wants this show to happen more than any of us. He's just forgotten that, under the panic."`,
      `Miss Quill's eyes flick toward the dark above the stage. "Three things make a show, when it comes to it," she breathes. "The actor knows the part. The actor's dressed for it. And the lights come up. Lose any one and your eight hundred friends out there go home cross. Mind you sort all three." She returns to her page. "I'll be right here. I always am. Nobody ever remembers the prompter until the silence."`
    ],
    talk:[
      `"The Book first," murmurs Miss Quill. "Lines before frocks before lamps, if you want my order of service. A dressed actor with no words is just a well-turned-out disaster."`,
      `"Whistling," Miss Quill says, without looking up, in answer to a sound only she heard, "is how you call the flymen in the old days - whistle the wrong cue and a hundredweight of scenery comes down on your head. So we don't whistle backstage. We don't say the Scottish name. And we don't, ever, wish each other good luck." A beat. "Break a leg, by the way."`,
      `Miss Quill turns a page. "I've prompted leading ladies through divorces, drink, and one memorable nervous collapse during the interval of a farce. Whatever's got into Cordelia, it's not temperament. I've known her twenty years. That woman's frightened. Frightened people hide." She lets that sit. "You might be kinder to find her than to replace her. But that's not for me to say. I only say the lines."`
    ],
    wandered:false,talkCount:0,greetIdx:0,spoken:false,
    wander_off:`Miss Quill says nothing further. She has told you everything that matters and several things that don't yet, and now she waits, as prompters wait, in the ready dark.`,
    take:`Miss Quill gives you a look that could prompt a man clean off the stage. "I am not," she breathes, "a prop." You retreat.`
  },
  director:{
    name:'Mr Bellweather',
    rooms:['director_office'],
    examine:()=>G.flags.has_book
      ?`Mr Bellweather, the Director: a large, theatrical wreck of a man, hollowed out by the evening but - since Mr Pemberton's safe return - no longer actively disintegrating. He watches you with the desperate hope of a man who has handed someone else the wheel and is trying very hard not to grab it back.`
      :`Mr Bellweather, the Director: a large man built for grand gestures, currently folded over his own desk like a deckchair that has given up. He clutches the annotated Book to his chest. Forty years in the theatre have brought him to this provincial gala, and the universe has chosen tonight, of all nights, to take away his leading lady AND - he keeps saying it - his cat.`,
    greet:[
      `Mr Bellweather lifts his head from the desk and fixes you with a bloodshot eye. "You. The understudy." He says "understudy" the way other men say "iceberg". "Do you know what's happened? Cordelia's GONE. The house is FULL. And Mr Pemberton -" his voice cracks "- Mr Pemberton is NOT IN THE WINGS. Forty years he's watched every opening from his cushion and tonight, the one night, he is GONE. We are cursed. The show is finished. Finished!" He clutches the Book tighter and puts his head back down.`
    ],
    talk:()=>{
      if(G.flags.has_book)return null;
      if(G.inv.includes('mascot')){
        return '__GIVE_MASCOT__';
      }
      return [
        `"I can't think about lines!" wails Mr Bellweather into the desk. "I can't think about anything! Find Pemberton! A theatre without its cat is a theatre without its SOUL! He's our luck - he's been our luck since time immemorial - and without him on his cushion I cannot, I WILL not, raise that curtain." He peers up. "He's probably in the prop store. It got locked. Everything's locked. Everything's lost. Bring him back to me and I might - I might - believe we have a chance."`,
        `"The Book?" He clutches it closer. "This is the only whole copy of the play in the building and I am NOT letting it go while we're doomed. Bring me Pemberton. Give me one reason to think tonight isn't a catastrophe, and it's yours, and the part with it. Until then -" he shudders "- until then there is no show, so there are no lines, so there is no Book."`,
        `Mr Bellweather has his head in his hands. "Reginald," he is muttering. "Remember Reginald." Nobody remembers Reginald. It doesn't seem the moment to point this out.`
      ];
    },
    wandered:false,talkCount:0,greetIdx:0,spoken:false,
    wander_off:`Mr Bellweather sinks back over his desk. He has said his piece, which is, in essence: find the cat.`,
    take:`"I am the DIRECTOR," says Mr Bellweather, with a flicker of his old grandeur. "I am not to be HANDLED." The grandeur collapses. "Find the cat.")`.replace(')',''),
  },
  keeper:{
    name:'Albert',
    rooms:['stage_door'],
    examine:`Albert, the stage-door keeper: forty years on the door, a cardigan the colour of weak tea, half-moon spectacles, and a settled, almost religious conviction that the building would run beautifully if it weren't for the actors. He is not unkind. He is simply waiting for everyone to leave so he can lock up, which is, when you think about it, his entire job and his entire philosophy.`,
    greet:[
      `Albert lowers his racing paper a precise inch and regards you over his spectacles. "Understudy," he says, identifying you the way a farmer identifies a particular sheep. "Going on, are we? Well. Mind you sign the book." He raises the paper again. Then, from behind it: "And no, before you ask, you can't have a key. Actors and keys. Like toddlers and matches."`,
      `The paper lowers again. "Prop store, is it? The mascot?" Albert sniffs. "Aye, that's locked, and the key's on my board, and on my board it stays, because the LAST time I lent the prop-store key to an actor it came back three weeks later in a different county." He folds his arms. "I'm not an unreasonable man. But I've had no cocoa - that blessed urn's packed in - and a keeper with no hot drink doesn't do favours. Sort me a cocoa and we'll talk about your key. Not before."`,
      `"Hot cocoa," Albert repeats, with the firmness of a man stating his price. "Made proper, with milk, none of your black sludge. You manage that, and the prop-store key's yours for as long as you need it - within reason, and signed for. That urn in the green room's the trouble. Get it going. I've been dreaming of that cocoa since the half." He almost, almost, smiles. "Go on. Surprise me."`
    ],
    talk:[
      `"Cocoa," says Albert, not unkindly. "I'll know it when I taste it. The urn's in the green room and it wants water in it and switching on, and a drop of milk makes all the difference - black cocoa's a punishment, not a treat." He taps the empty flask. "I'll have my flask filled too, while you're about it, if you're feeling generous. But the mug's the price of the key."`,
      `Albert turns to the racing page. "I've kept this door through six artistic directors, two floods and a small fire," he says. "I'll keep it through tonight. You just bring me my cocoa." He underlines a horse. "Lucky Understudy, three-forty at Kempton. Forty to one. There's an omen in that, if you're the superstitious sort. I'm not. But there it is."`,
      `"Still no cocoa?" Albert peers at your empty hands and sighs the sigh of forty years. "Green room. Urn. Water, switch, milk, cocoa, mug. It's not Hamlet." He pauses. "Well. Some nights I'd say it's harder."`
    ],
    wandered:false,talkCount:0,greetIdx:0,spoken:false,
    wander_off:`Albert returns to the 3:40 at Kempton. The terms are clear and the terms are cocoa. There is no more to be said until a hot mug is in his hand.`,
    take:`Albert doesn't even lower the paper. "Try it," he says, "and you'll be barred from this door, this theatre, and - I'll see to it personally - the profession." You believe him.`
  },
  wardrobe:{
    name:'Mrs Tassel',
    rooms:['wardrobe'],
    examine:`Mrs Tassel, the wardrobe mistress: round, warm, and quick, with a tape-measure round her neck like a vicar's stole and a pincushion strapped to her wrist. She has dressed every actor in this building, knows all their secrets and all their measurements (the second being, she says, the more closely guarded), and treats costumes as living things in her temporary care. She is squinting, at present, at the eye of a needle as though it has personally betrayed her.`,
    greet:[
      `Mrs Tassel looks up from her hopeless needle with relief. "Oh, a face! Come in, love, come in. You'll be the one going on, God love you, in that gown of Cordelia's, which is a good two sizes off you and will need taking in sharpish - I can do it, three pins and a tuck, I've worked miracles in less time." Her face falls. "IF I can thread a blessed needle, which I can't, because I've gone and lost my little silver threader, and my eyes -" she catches herself "- my eyes are PERFECTLY FINE, it's the needle's at fault. But I'm stuck, love. Properly stuck."`,
      `"My needle-threader," Mrs Tassel says, miming a small silver implement. "Shaped like a little lady's head, wire loop for the hair - you'll know it. I had it not an hour ago. I'll bet you it's rolled off somewhere and ended up in the prop store - things have a way of migrating to that prop store, like an elephants' graveyard for odds and ends. Find me that, and I can thread up and take Cordelia's gown in for you in a tick." She lowers her voice. "And another thing. That gown's on a locked rail in her room, but the lock's a paltry little thing - a stout pin and a steady hand. Get me my threader and I'll show you the trick of it myself; I'll not have you butchering a costume of mine with a hatpin unsupervised."`
    ],
    talk:()=>{
      if(G.flags.has_costume)return [
        `"You look the part now, love," beams Mrs Tassel, "and that's half of acting, whatever they tell you. Knock 'em dead. Not literally. Remember Reginald."`,
        `Mrs Tassel is already back at her mending, humming. "Go on," she says, "they're waiting. And the gown sits beautiful on you, if I say so myself."`
      ];
      if(G.flags.threader_returned)return '__DRESS_PROMPT__';
      if(G.inv.includes('threader'))return '__GIVE_THREADER__';
      return [
        `"Still no threader, love?" Mrs Tassel sighs. "Have a hunt in the prop store. Small, silver, little lady's head. Without it I can't take that gown in, and you can't go on dressed as a parlourmaid when you're meant to be the mistress of the house." She squints again at the needle and gives up.`,
        `"It's not vanity, the gown," she says, threading nothing. "An audience forgives a fluffed line. They never forgive a costume that doesn't fit - it tells them, somewhere they don't even notice, that nobody's in charge. So we get it right. Soon as I've my threader."`
      ];
    },
    wandered:false,talkCount:0,greetIdx:0,spoken:false,
    wander_off:`Mrs Tassel turns back to Deirdre the dummy with a sigh and a mouthful of pins. The next move, clearly, is to find that threader.`,
    take:`"Hands OFF, you, I'm not a bolt of cloth," says Mrs Tassel, but she's half laughing. "Go and be useful. Find my threader."`
  },
  brenda:{
    name:'Brenda',
    rooms:['box_office'],
    examine:`Brenda, the box-office manager: a brisk, anxious woman who has held this theatre together with a card machine and willpower for longer than anyone can remember, and who regards the artistic side of the building as a beautiful, expensive, unreliable pet. She is currently at war with a seating plan and losing.`,
    greet:[
      `Brenda thrusts the seating plan at you the instant you appear, as drowning people thrust things at passing boats. "You - can you READ this? There's a VIP party, the Mayor and some sponsor, front of the circle, and I cannot make out these seat numbers to save my life, the print gets smaller every YEAR -" she holds it at arm's length, then close "- and if I sit the Mayor in the wrong seat there'll be MURDER, and I've a queue, and -" she stops, breathes. "Sorry. It's been a night."\n\nShe narrows her eyes at you. "Milk, is it? For the keeper's cocoa? Everyone wants something tonight. Tell you what - you help ME first. Read me these seat numbers off the plan so I can place this wretched VIP party, and the milk's yours. TALK to me again when you're ready to read."`
    ],
    talk:()=>{
      if(G.flags.has_milk)return [
        `"Milk's gone, I've placed my Mayor, and for the first time tonight something has gone RIGHT," says Brenda. "Now go and save the show so all these lovely full-price seats don't ask for their money back."`,
        `Brenda is happily inking little crosses onto her seating plan. "Front of the circle for the Mayor," she murmurs. "Perfect. Off you go, love."`
      ];
      if(G.flags.brenda_helped)return '__GIVE_MILK__';
      return [
        `"Help me with the plan first, love," says Brenda, waving it. "I can't read the little numbers and I won't say why -" (it is very obviously her eyesight) "- and once that Mayor's placed, the milk is yours." She holds the plan up to the light in vain.`,
        `"Everyone thinks the box office is the easy job," Brenda mutters. "Nobody's ever had to seat a Mayor, a sponsor AND the sponsor's wife, who do not all speak to each other, in a single row, by feel, because the print's too small. Read me the numbers, love. Please."`
      ];
    },
    wandered:false,talkCount:0,greetIdx:0,spoken:false,
    wander_off:`Brenda turns back to her plan and her queue, the eternal twin pressures of the box office. Read her those seat numbers and the milk is as good as yours.`,
    take:`"I'm not for taking anywhere, love, I've a float to count," says Brenda. "Twice before, twice after. It's the only thing in this building that adds up."`
  },
  vane:{
    name:'Cordelia Vane',
    rooms:['diva_room'],
    examine:()=>G.flags.knows_vane_hiding
      ?`Cordelia Vane, the leading lady, the terror and glory of the Marwood Empire for fifteen years - and, right now, a frightened woman of a certain age folded into the corner of her own chaise in a dressing gown, her famous dark eyes huge in a face scrubbed bare of its armour. Without the make-up, without the gown, without the grandeur, she looks exactly like what she is tonight: someone who has suddenly, after a lifetime, become afraid of the one thing she was always sure of.`
      :`There's no one here to examine - only the warm dent in the chaise where someone was sitting moments ago.`,
    greet:[
      `Cordelia watches you for a long moment without her usual performance. "So they sent the understudy," she says at last, very quietly, no grandeur in it at all. "Of course they did. Three seasons you've waited for me to break a leg, and here I am, not broken, just -" she gestures at herself "- stopped. I can't go on. I've gone on eight thousand times and tonight I simply... can't. The full house. The Mayor. The notion that this one might be the night they finally see I'm too old, too tired, finished -" She stops. "Don't tell Bellweather I'm here. Let them think I vanished. It's a kinder story than the truth."`
    ],
    talk:()=>{
      return [
        `"You think I'm being a monster," Cordelia says. "The diva, sulking. I've read the same reviews you have - 'Vane, still capable of moments.' MOMENTS. Forty years and I'm down to moments." She pulls the dressing gown tighter. "Out there are eight hundred people and any one of them might be the one who finally thinks: she's past it. And I would rather vanish into a story about a missing leading lady than stand in the light and find out."`,
        `You find yourself telling her the truth: that you'd give anything for one of the nights she's frightened of. That the light she's hiding from is the only thing you've ever wanted to stand in. That an audience doesn't come to catch you failing - they come, eight hundred of them on a damp night, hoping with their whole hearts that you'll be wonderful, because if you are, then maybe they can be too.\n\nCordelia is quiet for a long time. "When did the understudy get wise?" she says, but her voice has changed.`,
        `Cordelia stands. Something settles back into her spine, vertebra by vertebra - not the diva's armour, something older and better. "I'm not going on tonight," she says. "That much is true. But YOU are. And you're going on right." She unpins a great glittering paste brooch from her dressing gown and closes your hand around it. "For luck. It's seen more first nights than God and it's never let me down - tonight excepted, and that's my fault, not its." She manages a smile. "Wear my gown. Say my lines. And when you get the laugh on the weather line in Act One - you will, if you wait half a beat longer than feels safe - know that somewhere in the dark I'm hearing it. Now GO. You'll want Mrs Tassel for the gown. Tell her I sent you. She'll cry. She always cries."`
      ];
    },
    wandered:false,talkCount:0,greetIdx:0,spoken:false,
    wander_off:`Cordelia waves you out with a flick of the wrist that is, for the first time tonight, almost playful. "Go on. Go and be wonderful. One of us ought to be, tonight."`,
    take:`"Darling," says Cordelia, with a ghost of her old steel, "no one takes Cordelia Vane anywhere. She arrives, or she does not arrive. Tonight she does not arrive - but you will." `
  },

function roomItems(rid){return Object.entries(ITEMS).filter(([,it])=>it.room===rid).map(([id])=>id);}

function findItem(frag){

    if(n.includes(f))sc=f.length/n.length;

/* Disambiguation state */

  const f=input.toLowerCase();

function makeDisambigChoices(cmd,items,feats){

/* ── ROOM DESCRIPTION ── */
function descRoom(force){
  const room=ROOMS[G.location];
  const isNew=!G.visited.has(G.location);if(isNew)G.visited.add(G.location);
  startChunk(room.name);
  const descFn=(isNew||force)?room.desc_l:room.desc_s;
  const desc=typeof descFn==='function'?descFn():descFn;
  desc.split('\n').filter(l=>l.trim()).forEach(l=>op(l));
  const vis=roomItems(G.location).filter(id=>!ITEMS[id].fixed&&!ITEMS[id].hidden);
  if(vis.length)op('You can see: '+vis.map(id=>ITEMS[id].name).join(', ')+'.','items');
  (room.npcs||[]).forEach(nid=>{
    const n=NPCS[nid];if(n&&n.rooms.includes(G.location)&&!n.wandered){
      if(nid==='prompter')op('Miss Quill keeps her still watch at the prompt desk.','npc');
      else if(nid==='director')op(G.flags.has_book?'Mr Bellweather slumps at his desk, hollowed out but calm.':'Mr Bellweather is collapsed over his desk, clutching the Book.','npc');
      else if(nid==='keeper')op('Albert watches you over his racing paper from the lodge.','npc');
      else if(nid==='wardrobe')op(G.flags.has_costume?'Mrs Tassel beams over the gown she\'s just fitted to you.':G.inv.includes('star_gown')?'Mrs Tassel reaches eagerly for the gown over your arm.':G.flags.threader_returned?'Mrs Tassel sits threaded-up and ready, waiting for Cordelia\'s gown.':'Mrs Tassel despairs over an unthreadable needle.','npc');
      else if(nid==='brenda')op(G.flags.brenda_helped?'Brenda works happily through the seating plan, the crisis behind her.':'Brenda wrestles with the seating plan, defeated by the small print.','npc');
      else if(nid==='vane'&&G.flags.knows_vane_hiding)op('Cordelia Vane is folded into the corner of the chaise, watching you.','npc');
    }
  });
  const seen=new Set();const exitLines=[];
  Object.entries(room.exits).forEach(([dir,dest])=>{
    if(!seen.has(dest)&&ROOMS[dest]){seen.add(dest);
      const sh=Object.entries(room.exits).filter(([,v])=>v===dest).sort((a,b)=>a[0].length-b[0].length)[0][0];
      exitLines.push(sh+' - '+ROOMS[dest].name);}
  });
  op('Exits: '+exitLines.join(', ')+'.','exits');
  if(isNew&&G.location!=='dressing_room')addScore(3,'explored '+room.name);
  endChunk();
}

function cmdExamine(target){
  startChunk();
  const nid=findNPC(target);
  if(nid){const ex=NPCS[nid].examine;op(typeof ex==='function'?ex():ex);endChunk();return;}
  const allItems=findItemAll(target).filter(function(id){return inScope(id);});
  const allFeats=findFeatAll(target,G.location);
  if(needsDisambig(allItems,allFeats)){
    endChunk();showDisambig(makeDisambigChoices('examine',allItems,allFeats));return;
  }
  const iid=allItems[0]||null;
  if(iid&&inScope(iid)){
    const it=ITEMS[iid];const d=typeof it.desc==='function'?it.desc():it.desc;
    d.split('\n').forEach(l=>op(l));handleItemExamineEffects(iid);endChunk();return;
  }
  const fk=allFeats[0]||null;
  if(fk){
    const fv=ROOMS[G.location].feats[fk];const ft=typeof fv==='function'?fv():fv;
    ft.split('\n').forEach(l=>op(l));handleFeatExamineEffects(fk);endChunk();return;
  }
  const t=target.toLowerCase();
  if(inc(t,'self')||inc(t,'myself')||t==='me'||t==='posy'||t==='understudy'){
    op('You are Posy Trundle: understudy, thirty-nine, with a good memory for lines and a bad memory for being chosen. Three seasons you\'ve sat in the cupboard in your grey frock, word-perfect, while Cordelia Vane went on and on and on. You have a stick of greasepaint worn to a nub, a rabbit\'s foot that has never worked, and - tonight, for the first time - the distinct and terrifying possibility of a stage.');
    op('Your stomach feels like the inside of a tumble dryer. This, the old hands say, is exactly how it should feel.','system');
    endChunk();return;
  }
  if(inc(t,'time')||inc(t,'clock')||inc(t,'curtain')){
    op('There is no clock backstage you can see, but you can feel the time the way you feel weather coming: the audience settling, the orchestra finishing its tuning, the particular thickening of the air that means curtain-up is minutes off. Not long. Not long at all.','system');endChunk();return;
  }
  if(inc(t,'pemberton')||inc(t,'cat')||inc(t,'mascot')){
    if(G.inv.includes('mascot')){op('Mr Pemberton rides in the crook of your arm, lopsided and serene, his one green glass eye and one button eye surveying the building he has watched over since time immemorial.','system');}
    else op('Mr Pemberton, the stuffed mascot cat, isn\'t with you - he\'s shut in the prop store, which is the whole trouble. The Director cannot raise the curtain without his luck on its cushion in the wings.','system');
    endChunk();return;
  }
  op('You see nothing like that to examine here - or it isn\'t here.','error');endChunk();
}

function cmdTake(target){
  startChunk();
  const nid=findNPC(target);if(nid){op(NPCS[nid].take,'npc');endChunk();return;}
  const f=target.toLowerCase();
  /* fixed-scenery quick refusals handled via item take_resp below; environment catch-alls: */
  const envTake={
    audience:'You cannot pocket eight hundred people, however much you might like to take them somewhere quiet and explain the situation.',
    seats:'The seats are bolted down and full of paying customers. Both facts discourage removal.',
    floor:'The stage floor is sacred and also nailed down.',
    boards:'The boards stay. You tread them; you don\'t take them.',
    wall:'The architecture is not for taking.',
    light:'The lights are wired into the building. What they need is a fuse, not a thief.',
    pigeon:'The theatre pigeon regards your outstretched hand with contempt and does not move. It has outlasted better people than you.',
  };
  for(const[key,resp] of Object.entries(envTake)){const kre=new RegExp('\\b'+key+'\\b');if(kre.test(f)){op(resp,'error');endChunk();return;}}
  /* disambiguation among takeable items */
  var ff2=f.split(/\s+/).filter(function(w){return w.length>2;});
  const takeablePool=roomItems(G.location).filter(function(id){return !G.inv.includes(id)&&!ITEMS[id].fixed;});
  var takeMatches=takeablePool.filter(function(id){
    var n=ITEMS[id].name.toLowerCase();
    return n===f||n.includes(f)||ff2.some(function(w){return n.includes(w);});
  });
  if(takeMatches.length>1){endChunk();showDisambig(makeDisambigChoices('take',takeMatches,[]));return;}
  const pool=roomItems(G.location).filter(function(id){return !G.inv.includes(id);});
  var found=pool.find(function(id){return ITEMS[id].name.toLowerCase()===f;});
  if(!found)found=pool.find(function(id){var n=ITEMS[id].name.toLowerCase();return n.includes(f)||ff2.every(function(w){return n.includes(w);});});
  if(!found){
    const carried=G.inv.find(function(id){var n=ITEMS[id].name.toLowerCase();return n.includes(f)||ff2.every(function(w){return n.includes(w);});});
    if(carried){op('You\'re already carrying '+itemArt(carried)+'.','system');endChunk();return;}
    /* fixed-feature refusal: if it matches a feat, give a take-ish nudge */
    const fk=findFeat(f,G.location);
    if(fk){op('You can\'t pocket that. Examine it for a closer look, or look for something you can actually pick up.','error');endChunk();return;}
    op('You don\'t see anything like that here to pick up.','error');endChunk();return;
  }
  const it=ITEMS[found];
  if(it.fixed){op(it.take_resp||'It\'s firmly fixed in place.','error');endChunk();return;}
  G.inv.push(found);ITEMS[found].room=null;
  op('You take '+itemArt(found)+'.','success');
  upStatus();endChunk();
}

function cmdDrop(target){
  startChunk();const f=target.toLowerCase();const fw=f.split(/\s+/).filter(w=>w.length>2);
  const idx=G.inv.findIndex(id=>{const n=ITEMS[id].name.toLowerCase();return n.includes(f)||fw.every(w=>n.includes(w));});
  if(idx<0){op('You\'re not carrying anything like that.','error');endChunk();return;}

}

/* Step: fill + switch on the urn (green room) */
function cmdFillUrn(){
  startChunk();
  if(G.location!=='green_room'){op('There\'s no urn here. The tea urn lives in the green room.','error');endChunk();return;}
  if(G.flags.cocoa_made){op('You\'ve already made the cocoa. The urn has done its work for the night.','system');endChunk();return;}
  if(G.flags.urn_filled){op('The urn is already filled and heating. What it wants now is the cocoa-making - the tin\'s on the shelf, but you\'ll need milk before it\'s worth a thing.','system');endChunk();return;}
  op('You haul the urn lid open, fill it from the green-room tap until it\'s good and full, drop the lid, and find the switch.');
  op('It shudders, ticks, and begins - with the slow grandeur of a great ship leaving harbour - to heat.','success');
  op('Now: cocoa powder (on the shelf), hot water (coming), and milk. Find some milk and you can make the cocoa itself.','system');
  G.flags.urn_filled=true;addScore(5,'resurrected the green-room urn');
  upStatus();endChunk();
}

/* Step: make the cocoa (needs urn filled + milk) */
function cmdMakeCocoa(){
  startChunk();
  if(G.location!=='green_room'){op('You make cocoa at the urn, and the urn\'s in the green room.','error');endChunk();return;}
  if(G.inv.includes('cocoa')||G.flags.cocoa_made){op('You\'ve already got a steaming mug of cocoa made. Albert\'s waiting for it.','system');endChunk();return;}
  if(!G.flags.urn_filled){op('The urn\'s cold and empty. Fill it and switch it on first - try FILL URN.','error');endChunk();return;}
  if(!G.inv.includes('milk')){op('You\'ve got the urn heating and the cocoa tin to hand, but no milk - and Albert was very clear that black cocoa is "a punishment, not a treat". You need a drop of milk. The box office has the only milk in the building.','error');endChunk();return;}
  var usedOwnMug=G.inv.includes('empty_mug');
  op('The urn has come to the boil. You spoon cocoa from the tin into a mug'+(usedOwnMug?' - your own WORLD\'S MOST MEDIOCRE UNDERSTUDY one, as it happens':'')+', draw off a measure of scalding water, and add a generous slug of Brenda\'s milk.');
  op('You stir. It is, even by the standards of a building that runs on tea, a magnificent mug of cocoa.','success');
  G.inv=G.inv.filter(id=>id!=='milk'&&id!=='empty_mug');ITEMS.milk.room=null;ITEMS.empty_mug.room=null;
  G.inv.push('cocoa');ITEMS.cocoa.room=null;G.flags.cocoa_made=true;
  op('You now have a mug of cocoa - the single most powerful bargaining chip in the building.','items');
  addScore(8,'made the keeper\'s cocoa');upStatus();endChunk();
}

/* Step: fit the fuse (lighting box) */
function cmdFitFuse(){
  startChunk();
  if(G.location!=='lighting_box'){op('There\'s nothing to fit a fuse into here. The dead board is up in the lighting box.','error');endChunk();return;}
  if(G.flags.lights_fixed){op('The board\'s already fixed - the new fuse is in and the rig is alive. Save the rest for the show.','system');endChunk();return;}
  if(!G.inv.includes('spare_fuse')){op('The fuse holder gapes empty, but you haven\'t got a spare fuse to put in it. There was one in the prop store\'s electrical drawer.','error');endChunk();return;}
  op('You ease the cover off the lighting board, line up the chunky ceramic fuse, and press it home into the empty holder.');
  op('There is a deep, satisfying THUNK from somewhere in the building\'s bones. Indicator lights bloom across the board. Down on the stage, through the gallery window, the half-light swells all at once into honest, blazing gold.','success');
  G.inv=G.inv.filter(id=>id!=='spare_fuse');ITEMS.spare_fuse.room=null;
  G.flags.lights_fixed=true;addScore(12,'brought the stage lights back to life');
  op('The stage is lit. That\'s the lights sorted.','system');
  if(!(G.flags.has_book&&G.flags.has_costume))op('Lines and costume - whatever\'s still outstanding - remain.','system');
  upStatus();checkShowReady();endChunk();
}

/* Step: open the locked costume rail (diva room) — needs Mrs Tassel's blessing, i.e. threader returned */
function cmdPickCostume(){
  startChunk();
  if(G.location!=='diva_room'){op('The locked costume is in Miss Vane\'s dressing room.','error');endChunk();return;}
  if(G.flags.has_costume){op('You\'re already wearing the gown - Mrs Tassel saw to that. No need to pick any locks now.','system');endChunk();return;}
  if(G.flags.costume_freed){op('You\'ve already freed the gown - it\'s over your arm. Take it to Mrs Tassel in the wardrobe to be fitted.','system');endChunk();return;}
  if(!G.flags.knows_vane_hiding){op('It feels wrong to start forcing locks in here while the leading lady is missing. Have a proper look round the room first - something doesn\'t add up.','error');endChunk();return;}
  if(!G.flags.vane_blessing){op('You could force the little rail lock with your safety pin - but this is Cordelia\'s gown, and Cordelia is sitting right there. Forcing it past her would be a low thing to do. Talk to her first. She may yet give it freely.','error');endChunk();return;}
  if(!G.flags.threader_returned){op('Cordelia\'s given her blessing, but you promised Mrs Tassel you\'d not butcher one of her costumes unsupervised - and the gown needs taking in to fit you anyway. Get Mrs Tassel her needle-threader so she can do the job properly.','error');endChunk();return;}
  /* Got blessing + threader returned: go to wardrobe to be dressed */
  op('You free the gown from the locked rail with a deft twist of the safety pin - Mrs Tassel showed you the trick - and gather the midnight-blue silk over your arm. It\'s far too big for you as it stands. It will need taking in before it fits.','success');
  G.flags.costume_freed=true;G.inv.push('star_gown');ITEMS.star_gown.room=null;addScore(6,'freed the star costume');
  upStatus();endChunk();
}

/* Step: get dressed (wardrobe) — final assembly of the costume thread */
function cmdGetDressed(){
  startChunk();
  if(G.location!=='wardrobe'){op('Mrs Tassel does the dressing, and Mrs Tassel\'s in the wardrobe.','error');endChunk();return;}
  if(G.flags.has_costume){op('You\'re already dressed, love, and looking the part. Get to the stage.','system');endChunk();return;}
  if(!G.flags.costume_freed){
    if(!G.flags.vane_blessing){op('You\'ve nothing for Mrs Tassel to fit you into yet - the gown\'s still locked in Cordelia\'s room, and you\'ll want Cordelia\'s say-so before you touch it.','error');endChunk();return;}
    op('You\'ve Cordelia\'s blessing, but the gown\'s still on its locked rail in her room. Free it first - your safety pin and the trick Mrs Tassel taught you should do it.','error');endChunk();return;
  }
  if(!G.flags.threader_returned){op('Mrs Tassel takes the gown, reaches for her needle - and stops. "I still can\'t thread the blessed thing, love. My threader." Right. First things first.','error');endChunk();return;}
  op('Mrs Tassel takes the midnight-blue gown reverently, clucks over the fit, and goes to work: three pins, two tucks, a flashing needle (threaded, at last, with her recovered silver friend), and a great deal of muttering about "the state of the hem".');
  op('"There," she says, stepping back, her eyes suddenly bright. "Oh, love. Look at you. You look like the leading lady. Because tonight you ARE." She blows her nose loudly. "Cordelia said I\'d cry. Don\'t tell her she was right."','npc');
  op('You catch yourself in the wardrobe mirror: gowned, transformed, unmistakably the mistress of the house. The grey understudy is gone.','success');
  G.inv=G.inv.filter(id=>id!=='star_gown');ITEMS.star_gown.room=null;
  G.flags.has_costume=true;addScore(10,'were dressed for the part by Mrs Tassel');
  checkShowReady();
  upStatus();endChunk();
}

     (inc(lo,'fill')&&inc(lo,'water'))){endChunk();cmdFillUrn();return;}

  /* fuse fit */
  if(inc(lo,'fuse')||(inc(lo,'fix')&&(inc(lo,'board')||inc(lo,'light')))){endChunk();cmdFitFuse();return;}
  /* costume pin trick — explicit verb+noun, or (since this is reached via a use/unpick/force verb) a bare lock/rail/padlock reference */

     (inc(lo,'unpick')&&(inc(lo,'lock')||inc(lo,'rail')||inc(lo,'gown')||inc(lo,'dress')||inc(lo,'padlock')))||
     (inc(lo,'force')&&(inc(lo,'lock')||inc(lo,'rail')||inc(lo,'costume')||inc(lo,'gown')||inc(lo,'dress')||inc(lo,'padlock')))||

  /* give cocoa to albert / milk dependency handled via give */

  /* flavour item uses */
  const flavourUses={

  op('You\'re not sure how to use that here - or something\'s missing from the equation. Type HINT if you\'re stuck.','error');endChunk();

function cmdTalk(target){
  startChunk();
  /* In the diva room, attempting to talk (to Cordelia, or to the seemingly empty room) finds her */
  if(G.location==='diva_room'&&!G.flags.knows_vane_hiding){
    revealCordelia();endChunk();return;
  }
  let nid=findNPC(target)||(ROOMS[G.location].npcs||[]).find(n=>n!=='vane'||G.flags.knows_vane_hiding)||null;
  if(G.location==='diva_room'&&G.flags.knows_vane_hiding)nid='vane';
  if(!nid){op('There\'s nobody here to talk to.','error');endChunk();return;}
  const npc=NPCS[nid];
  if(!npc.rooms.includes(G.location)){op(npc.name+' isn\'t here.','error');endChunk();return;}
  if(npc.wandered){op(npc.wander_off,'npc');endChunk();return;}

  /* greet phase */
  if(!npc.spoken){
    const gi=npc.greetIdx||0;op(npc.greet[gi],'npc');npc.greetIdx=gi+1;
    if(npc.greetIdx>=npc.greet.length)npc.spoken=true;
    /* first-greet plot reveals */
    if(nid==='wardrobe'&&!G.flags.tassel_briefed){G.flags.tassel_briefed=true;}
    endChunk();return;
  }

  /* talk phase — resolve dynamic talk arrays + sentinels */
  let arr=typeof npc.talk==='function'?npc.talk():npc.talk;

  /* sentinels that trigger trades / state changes */
  if(arr==='__GIVE_MASCOT__'){endChunk();cmdGiveMascot();return;}
  if(arr==='__GIVE_THREADER__'){endChunk();cmdGiveThreader();return;}
  if(arr==='__DRESS_PROMPT__'){
    if(G.inv.includes('star_gown')){
      op('"There\'s the gown!" cries Mrs Tassel, reaching for it. "Got it off that rail nice and gentle, I hope. Right - hold still and let me take it in. GET DRESSED, love, and we\'ll have you a leading lady in no time."','npc');
    }else{
      op('"You\'ve got my threader back, bless you," says Mrs Tassel, "so I\'m ready when you are. Bring me Cordelia\'s gown - freed off that rail nice and gentle - and I\'ll dress you."','npc');
    }
    endChunk();return;
  }
  if(arr==='__GIVE_MILK__'){
    op('"You read me those numbers a treat," says Brenda, already happier. "Here - the milk, as promised. For the cocoa. I\'ll know if it\'s been up to anything." She hands you the bottle from the fridge.','npc');
    G.inv.push('milk');ITEMS.milk.room=null;G.flags.has_milk=true;
    addScore(6,'won the milk from Brenda');upStatus();endChunk();return;
  }
  if(!arr){op(npc.name+' has nothing to add right now.','npc');endChunk();return;}

  /* Brenda: helping her read the plan happens on first talk-after-greet */
  if(nid==='brenda'&&!G.flags.brenda_helped){
    doHelpBrenda();return;
  }

  /* Vane: the empathy arc; final stage grants blessing + brooch */
  if(nid==='vane'){
    const idx=npc.talkCount;
    if(idx<arr.length){
      op(arr[idx],'npc');npc.talkCount++;
      if(idx===arr.length-1){
        /* final beat: blessing + brooch */
        G.flags.vane_blessing=true;
        G.inv.push('brooch');ITEMS.brooch.room=null;
        op('You now carry Cordelia Vane\'s paste-diamond brooch - her luck, freely given.','items');
        addScore(12,'won Cordelia\'s blessing and her brooch');
        npc.wandered=true;
      }
      endChunk();return;
    }
    op(npc.wander_off,'npc');npc.wandered=true;endChunk();return;
  }

  /* generic multi-stage talk */
  if(npc.talkCount<arr.length){
    op(arr[npc.talkCount],'npc');npc.talkCount++;
    if(npc.talkCount>=arr.length&&['prompter','keeper','director'].indexOf(nid)<0){/* keep key NPCs available */}
  }else{
    op(arr[arr.length-1],'npc');
  }
  endChunk();
}

/* ── PROP STORE: taking the three key items ── */
function takeFromPropStore(which){
  startChunk();
  if(which==='mascot'){
    if(G.inv.includes('mascot')||ITEMS.mascot.room===null&&G.flags.has_book){op('You\'ve already got Mr Pemberton'+(G.flags.has_book?' safely delivered':'')+'.','system');endChunk();return;}
    G.inv.push('mascot');ITEMS.mascot.room=null;
    op('You lift Mr Pemberton down off his shelf. He is lighter than he looks and more dignified than he has any right to be. His one green glass eye regards you with ancient approval.','success');
    op('Get him to the Director, quick - the man\'s falling apart without his luck.','system');
    addScore(7,'rescued Mr Pemberton from the prop store');upStatus();endChunk();return;
  }
  if(which==='fuse'){
    if(G.inv.includes('spare_fuse')||G.flags.fuse_taken){op('You\'ve already taken the spare fuse.','system');endChunk();return;}
    G.inv.push('spare_fuse');ITEMS.spare_fuse.room=null;G.flags.fuse_taken=true;
    op('You fish the chunky ceramic fuse out of the "ELECTRICAL - PROBABLY" drawer. Exactly the sort of thing a dead lighting board might be missing.','success');
    addScore(5,'salvaged the spare fuse');upStatus();endChunk();return;
  }
  if(which==='threader'){
    if(G.inv.includes('threader')||G.flags.threader_returned){op('You\'ve already found the needle-threader.','system');endChunk();return;}
    G.inv.push('threader');ITEMS.threader.room=null;
    op('There, glinting in a tray of buttons where it rolled and was lost: Mrs Tassel\'s silver needle-threader, the little lady\'s-head with its wire loop of hair. Found at last.','success');

  }
}

/* Has the player engaged with the current room yet? (talked to its NPC, or it has no NPC and
   they've examined something / been here a moment). Used to decide gentle vs specific hints. */
function npcHereUnspoken(){
  return (ROOMS[G.location].npcs||[]).some(function(nid){
    if(nid==='vane'&&!G.flags.knows_vane_hiding)return G.location==='diva_room'; /* hidden NPC counts */
    return NPCS[nid]&&!NPCS[nid].wandered&&!NPCS[nid].spoken;
  });
}
/* Gentle, room-local nudges that DON'T reveal the downstream chain. Returned when the player
   asks for a hint somewhere they haven't really worked yet. */
function localNudge(){
  /* If someone's here you haven't really spoken to, that's always the local steer. */
  if(npcHereUnspoken()){
    if(G.location==='diva_room'&&!G.flags.knows_vane_hiding)
      return 'This is the leading lady\'s room and she\'s the one who\'s "vanished". Something doesn\'t add up in here. EXAMINE the things on the dressing table - and try TALKing, even to an apparently empty room.';
    if(G.location==='box_office'&&!G.flags.brenda_helped)
      return 'Brenda can\'t read the tiny seat numbers on her plan and needs someone who can. Do the obvious thing: READ THE SEATING PLAN for her (or TALK TO her). She\'ll be grateful - and helpful.';
    if(G.location==='stage_door'&&!G.flags.has_prop_key)
      return 'Albert keeps the keys and does favours only for favours. TALK TO him to find out his price.';
    if(G.location==='wardrobe'&&!G.flags.has_costume)
      return 'TALK TO Mrs Tassel - she\'ll dress you for the part, but she\'s lost something small and silver she needs first.';
    if(G.location==='director_office'&&!G.flags.has_book)
      return 'TALK TO the Director - he\'s clutching something you need, and won\'t let go until he\'s calmer.';
    if(G.location==='prompt_corner')
      return 'TALK TO Miss Quill, the prompter. She misses nothing and will tell you, quietly, what actually matters tonight.';
    return 'There\'s someone here. In a theatre full of people who all want something, the fastest way forward is usually to TALK TO them (and often more than once). See what they need.';
  }
  var n={
    dressing_room:'Start by getting yourself together. EXAMINE the things around you - the mirror, the script, the frock - and put your face on (try MAKE UP at the mirror; it steadies the nerves, and earns its keep). Then it\'s out into the building to see who needs what. (Type THINK any time for the big picture.)',
    corridor:'This corridor is the spine of the building - every door opens off it. Type EXITS to see them all, then go and meet people: the green room, the wardrobe, the box office, the stage door. Someone always needs something.',
    green_room:'The green room runs on hot drinks. EXAMINE the tea urn - getting it going feels like the sort of thing that earns goodwill from somebody.',
    wardrobe:'Wardrobe is where you\'ll be made to look the part. Talk to Mrs Tassel and EXAMINE her sewing things - she seems to be missing something small.',
    stage_door:'Albert guards the keys. EXAMINE the key board to see what\'s locked away, and TALK TO him - though he strikes you as a man who does favours only for favours.',
    box_office:'Brenda\'s drowning in tickets and tiny print. TALK TO her - help her out and she may help you.',
    prompt_corner:'You\'re in the wings now. TALK TO Miss Quill, the prompter - she misses nothing and says the quiet part out loud.',
    wings:'Scenery, ropes, and a way UP to the lighting box. Have a look around - EXAMINE the things here - and note the ladder for later.',
    stage:'This is where it all has to happen. EXAMINE the footlights and the auditorium - you\'ll get a sense of what still isn\'t right about the stage.',
    lighting_box:'The lighting board up here is the heart of the problem. EXAMINE it closely to see what it\'s missing.',
    director_office:'The Director has something you need but won\'t let go of it while he\'s in pieces. TALK TO him to find out what would calm him down.',
    diva_room:'Have a proper look around - EXAMINE the dressing table and the note - and try TALKing. The leading lady may be closer than the official story suggests.',
    prop_store:'This is the building\'s junk-drawer of treasures. EXAMINE the shelves and that electrical drawer - there are at least three useful things in here if you look.'
  };
  return n[G.location]||'Have a good look around - EXAMINE things and TALK to anyone here. Type THINK for the bigger picture.';
}
/* How many rooms has the player explored? Used to gate the strategic spoiler. */
function exploredEnough(){return G.visited.size>=4;}

function cmdHint(){
  startChunk('Hint');
  /* Endgame */
  if(G.flags.show_ready){
    if(G.location==='stage')op('You\'re on the lit stage, dressed, word-perfect, the brooch over your heart. There is nothing left to fetch. Take your place - try TAKE MARK, or just LOOK and let it happen.','system');
    else op('Lines, costume, lights - all done. Beginners have been called. Get to the STAGE (through the prompt corner) and take your place.','system');
    endChunk();return;
  }
  /* TIER 1 — gentle, room-local nudge if you're somewhere with unfinished local business
     (someone to talk to, or things to examine), OR you've barely started exploring.
     This avoids dumping the whole chain on a player who just wants to know what to do HERE. */
  var localBusiness=npcHereUnspoken()||
    (G.location==='green_room'&&!G.flags.urn_filled)||
    (G.location==='lighting_box'&&!G.flags.lights_fixed&&!G.inv.includes('spare_fuse'))||
    (G.location==='prop_store'&&G.flags.has_prop_key&&!(G.inv.includes('mascot')||G.inv.includes('spare_fuse')||G.inv.includes('threader')))||
    (G.location==='diva_room'&&!G.flags.knows_vane_hiding);
  if(localBusiness||!exploredEnough()){
    op(localNudge(),'system');
    op('(Still stuck? Type HINT again once you\'ve had a look around, and I\'ll be more specific. THINK shows the whole picture.)','system');
    endChunk();return;
  }
  /* TIER 2 — you've explored a fair bit and there's nothing obvious to do where you stand:
     point you at the specific next mechanical step in the dependency chain. */
  const haveKey=G.flags.has_prop_key;
  /* 1. Cocoa sub-chain to get the key */
  if(!haveKey){
    if(!G.flags.brenda_helped&&!G.inv.includes('milk')){
      if(G.location==='box_office'){
        op('Brenda just needs someone to read the tiny seat numbers she can\'t. Do exactly that: try READ THE SEATING PLAN (or TALK TO BRENDA). She\'ll give you the milk in thanks.','system');endChunk();return;
      }
      op('You need milk next, and Brenda in the BOX OFFICE has the only bottle - she\'ll swap it for help with her seating plan. Head there.','system');endChunk();return;
    }
    if(!G.flags.urn_filled){
      op('You\'ve (or will have) the milk. Now the urn: in the green room, FILL URN to get it heating.','system');endChunk();return;
    }
    if(!G.flags.cocoa_made){
      op('Urn\'s heating and you\'ve milk. In the green room, MAKE COCOA.','system');endChunk();return;
    }
    op('You\'ve a hot cocoa. Take it to Albert at the stage door and GIVE COCOA TO ALBERT for the prop-store key.','system');endChunk();return;
  }
  /* 2. With the key: the three threads */
  if(haveKey){
    if(!G.flags.has_book){
      if(!G.inv.includes('mascot')&&!ITEMS.mascot.room){/* delivered already shouldn't reach here */}
      if(!G.inv.includes('mascot')&&ITEMS.mascot.room!=='prop_store'&&G.flags.prop_store_opened===false){}
      if(!G.inv.includes('mascot')){
        op('LINES thread: get Mr Pemberton from the PROP STORE (off the corridor) and take him to the Director. TAKE PEMBERTON, then GIVE PEMBERTON TO BELLWEATHER.','system');endChunk();return;
      }
      op('You\'ve got Mr Pemberton. Take him up to the Director\'s office and GIVE PEMBERTON TO BELLWEATHER - he\'ll hand over the Book.','system');endChunk();return;
    }
    if(!G.flags.lights_fixed){
      if(!G.inv.includes('spare_fuse')&&!G.flags.fuse_taken){
        op('LIGHTS thread: there\'s a spare fuse in the prop store\'s electrical drawer. EXAMINE the electrical drawer, then TAKE FUSE.','system');endChunk();return;
      }
      op('You\'ve a spare fuse. Climb to the LIGHTING BOX (up from the wings) and FIT FUSE into the dead board.','system');endChunk();return;
    }
    if(!G.flags.has_costume){
      if(!G.inv.includes('threader')&&!G.flags.threader_returned){
        op('COSTUME thread: Mrs Tassel\'s needle-threader is in the prop store (examine the shelves / TAKE THREADER). Return it to her in the wardrobe.','system');endChunk();return;
      }
      if(!G.flags.threader_returned){
        op('Take the needle-threader back to Mrs Tassel in the wardrobe - GIVE THREADER TO TASSEL.','system');endChunk();return;
      }
      if(!G.flags.knows_vane_hiding){
        op('The gown\'s locked in Miss Vane\'s room - and something\'s odd in there. Go to her dressing room and EXAMINE the note and the chaise. The leading lady may be closer than anyone thinks.','system');endChunk();return;
      }
      if(!G.flags.vane_blessing){
        op('Cordelia is hiding in her own room, frightened. Don\'t force her gown - TALK TO CORDELIA, more than once. Hear her out, and she may give it freely.','system');endChunk();return;
      }
      if(!G.flags.costume_freed){
        op('Try freeing the gown by unpicking the lock on the rail with something you already have.','system');endChunk();return;
      }
      op('Take the freed gown to Mrs Tassel in the wardrobe and GET DRESSED.','system');endChunk();return;
    }
  }
  op('You\'re close. Type THINK to see exactly which of lines / costume / lights still needs doing.','system');
  endChunk();
}

/* ── SAVE / LOAD / RESTART ── */
function doRestart(){
  try{localStorage.removeItem('tsmgo_save');}catch(e){}
  G.turns=0;G.score=0;G.flags={};G.location='dressing_room';
  G.inv=['ruined_script','greasepaint','rabbits_foot','safety_pin'];
  G.visited=new Set();G.gameOver=false;G.awaitingRestartConfirm=false;
  Object.values(ITEMS).forEach(function(it){if(it._orig!==undefined)it.room=it._orig;delete it.given;});
  Object.values(NPCS).forEach(function(n){n.spoken=false;n.greetIdx=0;n.talkCount=0;n.wandered=false;});
  _pendingCmd='';outEl.innerHTML='';srEl.textContent='';
  upStatus();init();
}
function autoSave(){
  try{
    var d={turns:G.turns,score:G.score,flags:G.flags,location:G.location,
      inv:G.inv,visited:[...G.visited],gameOver:G.gameOver,
      npcState:Object.fromEntries(Object.entries(NPCS).map(function([id,n]){return[id,{spoken:n.spoken,greetIdx:n.greetIdx||0,talkCount:n.talkCount||0,wandered:n.wandered||false}];})),
      itemRooms:Object.fromEntries(Object.entries(ITEMS).map(function([id,it]){return[id,it.room];}))};
    localStorage.setItem('tsmgo_save',JSON.stringify(d));
  }catch(e){}
}
function doLoad(){
  var raw=localStorage.getItem('tsmgo_save');if(!raw)return false;
  var d=JSON.parse(raw);
  G.turns=d.turns||0;G.score=d.score||0;G.flags=d.flags||{};
  G.location=d.location||'dressing_room';G.inv=d.inv||[];
  G.visited=new Set(d.visited||[]);G.gameOver=d.gameOver||false;
  if(d.npcState)Object.entries(d.npcState).forEach(function([id,v]){
    if(NPCS[id]){NPCS[id].spoken=v.spoken||false;NPCS[id].greetIdx=v.greetIdx||0;NPCS[id].talkCount=v.talkCount||0;NPCS[id].wandered=v.wandered||false;}
  });
  if(d.itemRooms)Object.entries(d.itemRooms).forEach(function([id,v]){if(ITEMS[id])ITEMS[id].room=v;});
  upStatus();return true;
}
function cmdLoad(){
  startChunk();
  try{
    if(!doLoad()){op('No saved game found.','error');endChunk();return;}
    op('Game restored. Curtain still pending. Break a leg.','success');endChunk();descRoom(true);
  }catch(e){op('Could not load saved game.','error');endChunk();}
}

/* ── MAIN PARSER ── */
function parse(raw){
  if(!raw.trim())return;
  var cmd=norm(raw);
  if(_disambigChoices){if(resolveDisambig(cmd))return;}
  if(G.gameOver&&cmd!=='restart'&&!G.awaitingRestartConfirm){
    startChunk();op('The show is over and the curtain has fallen! Type RESTART to play again.','system');endChunk();return;
  }
  G.turns++;upStatus();autoSave();
  if(cmd==='repeat'||cmd==='r'||cmd==='again'){
    srEl.textContent='';void srEl.offsetWidth;srEl.textContent=G.lastText;
    startChunk('Last output (repeated)');G.lastText.split('\n').filter(s=>s.trim()).forEach(s=>op(s.trim()));endChunk();return;
  }
  if(cmd==='restart'){
    if(G.awaitingRestartConfirm){doRestart();return;}
    G.awaitingRestartConfirm=true;startChunk();
    op('Are you sure you want to restart? This will erase all your progress.','error');
    op('Type YES to confirm, or anything else to cancel.','system');endChunk();return;
  }
  if(G.awaitingRestartConfirm){
    G.awaitingRestartConfirm=false;
    if(['yes','y','confirm','ok'].includes(cmd)){doRestart();return;}
    startChunk();op('Restart cancelled. The show goes on.','system');endChunk();return;
  }
  if(cmd==='load'||cmd==='restore'){cmdLoad();return;}
  if(cmd==='look'||cmd==='l'||cmd==='look around'){cmdLook();return;}
  if(['hint','help me','i am stuck','stuck','clue',"i'm stuck"].includes(cmd)){cmdHint();return;}
  if(['inventory','i','inv','items','carried','carrying'].includes(cmd)){cmdInventory();return;}
  if(['help','h','?','commands'].includes(cmd)){cmdHelp();return;}
  if(cmd==='exits'||cmd==='where can i go'){cmdExits();return;}
  if(cmd==='score'||cmd==='points'){startChunk();op('Score: '+G.score+' / '+MAXSCORE+' in '+G.turns+' turns.','score');endChunk();return;}
  if(['think','ponder','recall','remember','what now','what next'].includes(cmd)){cmdThink();return;}
  if(cmd==='where am i'||cmd==='location'||cmd==='where are we'){
    startChunk();op('You are in: '+ROOMS[G.location].name+'.','system');
    var seen=new Set();var exitLines=[];
    Object.entries(ROOMS[G.location].exits).forEach(function([dir,dest]){
      if(!seen.has(dest)&&ROOMS[dest]){seen.add(dest);
        var sh=Object.entries(ROOMS[G.location].exits).filter(function([,v]){return v===dest;}).sort(function(a,b){return a[0].length-b[0].length;})[0][0];
        exitLines.push(sh+' - '+ROOMS[dest].name);}
    });
    op('Exits: '+exitLines.join(', ')+'.','exits');endChunk();return;
  }
  if(['take all','take everything','get all','get everything'].includes(cmd)){
    var takeable=roomItems(G.location).filter(function(id){return !ITEMS[id].fixed;});
    if(!takeable.length){startChunk();op('Nothing here to pick up.','system');endChunk();return;}
    startChunk();takeable.forEach(function(id){G.inv.push(id);ITEMS[id].room=null;op('Taken: '+ITEMS[id].name+'.','success');});
    upStatus();endChunk();return;
  }

  /* dedicated puzzle verbs (before quirky/generic) */
  if(inc(cmd,'fill')&&inc(cmd,'urn')||cmd==='fill urn'){cmdFillUrn();return;}
  if((inc(cmd,'make')&&inc(cmd,'cocoa'))||cmd==='make cocoa'){cmdMakeCocoa();return;}
  if((inc(cmd,'fit')&&inc(cmd,'fuse'))||cmd==='fit fuse'||(inc(cmd,'put')&&inc(cmd,'fuse'))||(inc(cmd,'replace')&&inc(cmd,'fuse'))){cmdFitFuse();return;}
  if(cmd==='get dressed'||cmd==='dress'||(inc(cmd,'put on')&&inc(cmd,'gown'))||(inc(cmd,'wear')&&inc(cmd,'gown'))||(inc(cmd,'wear')&&inc(cmd,'costume'))){cmdGetDressed();return;}

  /* prop-store item taking (special, key-gated room already opened) */
  if(G.location==='prop_store'&&wrd(cmd,'take','get','grab','pick','collect','fetch','retrieve','find')){
    if(inc(cmd,'pemberton')||inc(cmd,'cat')||inc(cmd,'mascot')){takeFromPropStore('mascot');return;}
    if(inc(cmd,'fuse')){takeFromPropStore('fuse');return;}
    if(inc(cmd,'threader')||inc(cmd,'needle')){takeFromPropStore('threader');return;}
  }

  if(tryQuirky(cmd))return;

  /* win shortcut if somehow ready and on stage */
  if(G.flags.show_ready&&!G.gameOver&&G.location==='stage'&&wrd(cmd,'go','begin','perform','act','start')){doWin();return;}

  var room=ROOMS[G.location];
  if(room.exits[cmd]){cmdMove(room.exits[cmd]);return;}
  var goM=cmd.match(/^(?:go|walk|move|head|travel|run|proceed|enter|exit|leave|climb|make (?:my )?way(?:\s+to)?)\s+(?:to\s+|the\s+)?(.+)$/);
  if(goM){
    var arg=goM[1].trim();
    if(room.exits[arg]){cmdMove(room.exits[arg]);return;}
    var best=Object.entries(room.exits).find(function([k]){var kw=k.split(/\s+/);var aw=arg.split(/\s+/);return kw.some(function(kp){return aw.some(function(ap){return ap===kp&&ap.length>2;});});});
    if(best){cmdMove(best[1]);return;}
    startChunk();op('You can\'t get to "'+arg+'" from here. Type EXITS to see your options.','error');endChunk();return;
  }
  var xM=cmd.match(/^(?:examine|x|look at|look in|look inside|inspect|read|describe|study|check|view|peer at|peer into)\s+(.+)$/);
  if(xM){cmdExamine(xM[1].trim());return;}
  var tkM=cmd.match(/^(?:take|get|pick up|pick|grab|collect|acquire|retrieve|lift|fetch|pocket|gather)\s+(.+)$/);
  if(tkM){cmdTake(tkM[1].trim());return;}
  var drM=cmd.match(/^(?:drop|put down|set down|discard|leave|abandon)\s+(.+)$/);
  if(drM){cmdDrop(drM[1].trim());return;}
  var usM=cmd.match(/^(?:use|combine|apply|operate|try using|employ|unpick|undo|unlock|jimmy|prise|prize|pry)\s+(.+)$/);
  if(usM){cmdUse(usM[1].trim());return;}
  var tlM=cmd.match(/^(?:talk|speak|chat|converse|ask|greet|address|hail|say hello to)\s+(?:to\s+|with\s+)?(.+)$/);
  if(tlM){cmdTalk(tlM[1].trim());return;}
  if(['talk','speak','chat'].includes(cmd)){cmdTalk('');return;}
  if(/^(?:give|show|offer|present|hand|return)\s+/.test(cmd)){cmdGive(raw);return;}
  /* bare 'use pin' etc */
  if(/^(?:use|combine|fit|put|stick|attach|fix|pick|force|unpick|undo|unlock)\b/.test(cmd)){cmdUse(cmd);return;}

  startChunk();
  op(rnd([
    'That\'s not something you can do here - or the words are a little outside what this stage understands. Type HELP for commands.',
    'You try it with great conviction. The universe applauds the effort and declines the action. Try HELP.',
    'That\'s not in tonight\'s script. Perhaps a different approach? HELP lists what\'s understood.'
  ]),'error');endChunk();
}

var inputEl=document.getElementById('cmd-input');
document.getElementById('cmd-submit').addEventListener('click',submit);
inputEl.addEventListener('keydown',function(e){
  if(e.key==='Enter'){submit();return;}
  if(e.key==='ArrowUp'){
    e.preventDefault();if(!G.history.length)return;
    if(G.histIdx<0)G.histIdx=G.history.length-1;else G.histIdx=Math.max(0,G.histIdx-1);
    inputEl.value=G.history[G.histIdx];inputEl.setSelectionRange(inputEl.value.length,inputEl.value.length);
  }else if(e.key==='ArrowDown'){
    e.preventDefault();if(G.histIdx<0)return;
    G.histIdx=Math.min(G.history.length-1,G.histIdx+1);
    inputEl.value=G.history[G.histIdx];inputEl.setSelectionRange(inputEl.value.length,inputEl.value.length);
  }
});
function submit(){var v=inputEl.value.trim();if(!v)return;G.history.push(v);G.histIdx=-1;inputEl.value='';outEl.focus();showCmd(v);parse(v);setTimeout(function(){inputEl.focus();},50);}
function quickCmd(cmd){G.history.push(cmd);G.histIdx=-1;showCmd(cmd);parse(cmd);inputEl.focus();}

Object.entries(ITEMS).forEach(function([,it]){it._orig=it.room;});

function init(){
  var loaded=false;
  try{var r=localStorage.getItem('tsmgo_save');if(r){var d=JSON.parse(r);if(d&&d.turns>0&&!d.gameOver){doLoad();loaded=true;}}}catch(e){}
  startChunk('The Show Must Go On');
  op('A backstage comedy in one frantic evening.','system');
  op('Type HELP for commands. The quick buttons below are always available. Up and down arrows recall previous commands.','system');
  endChunk();
  if(!loaded)descRoom(true);
  upStatus();inputEl.focus();
}
init();
