<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Show Must Go On - A Text Adventure</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0a0f;--surface:#161018;--border:#2e2330;--text:#e0d6d8;--text-dim:#8a7a82;
  --gold:#c89b3c;--gold-light:#ecc463;--blue:#7a93b8;--green:#86c08a;--rose:#c87a8f;--focus:#ecc463;
  --font:'Courier New',Courier,monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:16px;
  line-height:1.75;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem;}
.skip-link{position:absolute;top:-9999px;left:0;background:var(--gold);color:#000;
  padding:.5rem 1rem;z-index:100;font-weight:bold;}
.skip-link:focus{top:0;}
#game-wrapper{width:100%;max-width:780px;display:flex;flex-direction:column;}
header{border-bottom:1px solid var(--border);padding:1rem 0 .75rem;}
h1{font-size:1.4rem;color:var(--gold-light);letter-spacing:.15em;text-transform:uppercase;}
#subtitle{font-size:.85rem;color:var(--text-dim);margin-top:.25rem;}
#status-bar{background:var(--surface);border:1px solid var(--border);border-top:none;
  padding:.5rem 1rem;font-size:.8rem;color:var(--text-dim);display:flex;gap:1.5rem;flex-wrap:wrap;}
#status-bar strong{color:var(--gold);}
#output-region{background:var(--surface);border:1px solid var(--border);border-top:none;
  padding:1rem 1.25rem;min-height:420px;max-height:58vh;overflow-y:auto;scroll-behavior:smooth;}
.chunk{margin-bottom:1.25rem;}
.chunk:last-child{margin-bottom:0;}
.chunk h2{font-size:1.05rem;color:var(--gold-light);font-weight:bold;margin-bottom:.5rem;}
.chunk p{margin-bottom:.45rem;color:var(--text);}
.chunk p:last-child{margin-bottom:0;}
.chunk p.t-items{color:var(--green);}
.chunk p.t-exits{color:var(--blue);}
.chunk p.t-system{color:var(--text-dim);font-style:italic;}
.chunk p.t-error{color:#bf6a6a;}
.chunk p.t-success{color:var(--gold-light);font-weight:bold;}
.chunk p.t-score{color:var(--gold);}
.chunk p.t-npc{color:var(--rose);font-style:italic;}
.chunk hr{border:none;border-top:1px solid var(--border);margin:.5rem 0;}
.cmd-sep{border-top:1px solid var(--border);margin-bottom:0.5rem;padding-top:0.6rem;}
.you-said-label{font-size:0.75rem;color:var(--text-dim);font-weight:normal;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.15rem;}
.you-said-text{color:var(--gold);font-size:0.95rem;margin-bottom:0.4rem;}
.i-said-label{font-size:0.75rem;color:var(--text-dim);font-weight:normal;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.3rem;}
#sr-live{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;}
#input-area{background:var(--surface);border:1px solid var(--border);border-top:1px solid var(--border);
  padding:.75rem 1rem;display:flex;align-items:center;gap:.5rem;}
#input-area:focus-within{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);}
#prompt-sym{color:var(--gold);flex-shrink:0;}
#cmd-input{flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font);font-size:1rem;caret-color:var(--gold);}
#cmd-submit{background:transparent;border:1px solid var(--border);color:var(--text-dim);
  font-family:var(--font);font-size:.85rem;padding:.3rem .75rem;cursor:pointer;border-radius:2px;}
#cmd-submit:hover{color:var(--text);border-color:var(--gold);}
#cmd-submit:focus{outline:2px solid var(--focus);outline-offset:2px;}
#quick-bar{background:var(--bg);border:1px solid var(--border);border-top:none;
  padding:.5rem 1rem;display:flex;flex-wrap:wrap;gap:.4rem;align-items:center;}
#quick-label{font-size:.75rem;color:var(--text-dim);flex-shrink:0;margin-right:.25rem;}
.qbtn{background:transparent;border:1px solid var(--border);color:var(--text-dim);
  font-family:var(--font);font-size:.75rem;padding:.2rem .6rem;cursor:pointer;border-radius:2px;}
.qbtn:hover{color:var(--text);border-color:var(--gold);}
.qbtn:focus{outline:2px solid var(--focus);outline-offset:2px;color:var(--text);}
#kb-hints{font-size:.75rem;color:var(--text-dim);padding:.5rem 1rem;
  border:1px solid var(--border);border-top:none;background:var(--bg);}
kbd{font-family:var(--font);background:#1e1622;border:1px solid var(--border);
  border-radius:2px;padding:0 4px;font-size:.75rem;}
</style>
</head>
<body>
<a class="skip-link" href="#cmd-input">Skip to command input</a>
<div id="game-wrapper" role="application" aria-label="The Show Must Go On text adventure">
  <header role="banner">
    <h1>The Show Must Go On</h1>
    <p id="subtitle">A text adventure. Type HELP for commands, or use the quick buttons below. Progress saves automatically.</p>
  </header>
  <div id="status-bar" role="status" aria-label="Game status" aria-live="off">
    <span>Location: <strong id="s-loc">-</strong></span>
    <span>Curtain in: <strong id="s-clock">15 min</strong></span>
    <span>Turns: <strong id="s-turns">0</strong></span>
    <span>Score: <strong id="s-score">0 / 168</strong></span>
  </div>
  <main id="output-region" tabindex="-1" aria-label="Game transcript"></main>
  <div id="sr-live" aria-live="polite" aria-atomic="true" aria-label="Game output"> </div>
  <div id="input-area">
    <span id="prompt-sym" aria-hidden="true">&gt;</span>
    <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-label=" "/>
    <button id="cmd-submit" aria-label="Submit command">Enter</button>
  </div>
  <div id="quick-bar" role="toolbar" aria-label="Quick commands">
    <span id="quick-label">Quick:</span>
    <button class="qbtn" onclick="quickCmd('look')" aria-label="Look around">Look</button>
    <button class="qbtn" onclick="quickCmd('inventory')" aria-label="Show inventory">Inventory</button>
    <button class="qbtn" onclick="quickCmd('exits')" aria-label="List exits">Exits</button>
    <button class="qbtn" onclick="quickCmd('repeat')" aria-label="Repeat last output">Repeat</button>
    <button class="qbtn" onclick="quickCmd('help')" aria-label="Show help">Help</button>
    <button class="qbtn" onclick="quickCmd('hint')" aria-label="Get a hint">Hint</button>
    <button class="qbtn" onclick="quickCmd('restart')" aria-label="Restart game">Restart</button>
  </div>
  <p id="kb-hints" aria-hidden="true">
    <kbd>Enter</kbd> to submit &nbsp;·&nbsp;
    <kbd>↑</kbd><kbd>↓</kbd> recall commands &nbsp;·&nbsp;
    <kbd>Tab</kbd> between controls
  </p>
</div>
<script>
"use strict";
function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function inc(s,t){return s.toLowerCase().includes(t.toLowerCase());}
function wrd(s,...ws){return ws.some(w=>new RegExp('\\b'+w+'\\b','i').test(s));}
function norm(s){return s.toLowerCase().replace(/['']/g,"'").replace(/\s+/g,' ').trim();}

const ITEMS={
  /* ── STARTING INVENTORY ── */
  ruined_script:{name:'tea-stained script',art:'a',inv:true,
    desc:()=>`Your understudy's copy of tonight's play - "A Parlour in Petersfield", a drawing-room comedy of no great distinction but plenty of doors. The first two acts you know backwards. Act Three, however, is a catastrophe: somebody (you, three weeks ago, with a celebratory cup of tea) has welded the final pages into a single papery brick. You can make out the words "ENTER, dramatically" and then nothing but a brown continent of dried tea.\n\nYou need the real lines for Act Three${G.flags.has_book?', but happily you now have the Director\'s annotated Book, which has them all.':'. The only complete copy in the building is the Director\'s own annotated Book.'}`},
  greasepaint:{name:'stick of greasepaint',art:'a',inv:true,
    desc:`A well-loved stick of theatrical greasepaint, number five, worn down to a nub. It smells of every performance you've ever not quite been in. Warpaint for the perpetually overlooked.`,
    use_resp:`You could put your make-up on, but you'd do it properly at the mirror. Try MAKE UP or PUT ON MAKEUP at a mirror.`},
  rabbits_foot:{name:"lucky rabbit's foot",art:'a',inv:true,
    desc:`A moth-eaten rabbit's foot on a keyring, dyed a colour not found in nature or rabbits. It has brought you no discernible luck in eleven years of understudying, but you keep it, because the alternative is admitting that.\n\nTonight, you feel, it might finally clock on.`,
    use_resp:`You give the rabbit's foot a hopeful rub. Somewhere, statistically, your luck is presumably improving.`},
  safety_pin:{name:'safety pin',art:'a',inv:true,
    desc:`A large, sturdy safety pin, the universal currency of backstage. It has held up hems, scenery, and on one memorable occasion an entire actor. It feels like the sort of thing that earns its keep.`,
    use_resp:`A safety pin is endlessly useful, but you need the right thing to use it on.`},
  /* ── PLOT-CHAIN ITEMS (acquired through the chain) ── */
  prop_key:{name:'prop-store key',art:'the',room:null,
    desc:`A heavy iron key with a paper tag reading "PROP STORE - DO NOT LOSE - THIS MEANS YOU". Albert the stage-door keeper surrendered it with the air of a man handing over his firstborn.`},
  mascot:{name:'Mr Pemberton',art:null,room:null,
    desc:`Mr Pemberton: the Marwood Empire's beloved mascot, a stuffed ginger theatre cat of immense age and questionable taxidermy. One glass eye is green, the other is a shirt button. He has "watched" every opening night since time immemorial from his cushion in the wings, and the Director genuinely believes the show cannot succeed without him present. He is balding, lopsided, and frankly magnificent.`},
  spare_fuse:{name:'spare fuse',art:'a',room:null,
    desc:`A chunky old ceramic fuse, the cartridge kind, scavenged from the prop store's "ELECTRICAL - PROBABLY" drawer. Exactly the sort of thing a dead lighting board might be missing.`},
  threader:{name:'silver needle-threader',art:'a',room:null,
    desc:`Mrs Tassel's prized needle-threader: a slim silver thing shaped like a tiny lady's head with a wire loop of hair. She has been lost without it - literally; she can't thread a needle and won't admit she needs glasses. Returning this will make you, briefly, her favourite person in the building.`},
  milk:{name:'bottle of milk',art:'a',room:null,
    desc:`A small glass bottle of milk, cold from the box-office fridge. Brenda parted with it on the strict understanding that it is "for the keeper's cocoa, not for any funny business." You're not sure what funny business one could get up to with a third of a pint of milk, but you respect her vigilance.`},
  cocoa:{name:'mug of cocoa',art:'a',room:null,
    desc:`A steaming mug of cocoa, made in the green room with reconditioned urn-water and Brenda's milk. It says WORLD'S MOST MEDIOCRE UNDERSTUDY on the side. The single most powerful bargaining chip in the building.`},
  the_book:{name:"the Director's Book",art:null,room:null,
    desc:`The Director's prompt Book: the master copy of "A Parlour in Petersfield", fat with decades of pencilled blocking, cuts, and increasingly desperate marginalia ("WHY", "slower", "is this funny? check"). Crucially, Act Three is complete and legible. With this in your hands, you finally know the whole part.`},
  star_gown:{name:'midnight-blue gown',art:'the',room:null,
    desc:`Cordelia Vane's midnight-blue evening gown, freed from its rail and folded over your arm. It is, as it stands, far too big for you - it wants taking in before it'll fit. Mrs Tassel in the wardrobe is the woman for that.`},
  brooch:{name:'paste-diamond brooch',art:'a',room:null,
    desc:`Cordelia Vane's brooch: a great glittering paste-diamond starburst, the kind of thing that looks like the crown jewels from row Z and like a Christmas cracker from row A. She pressed it on you "for luck, darling - it's seen more first nights than God." It is, you realise, her version of a rabbit's foot.`},
  /* ── FIXED SCENERY: DRESSING ROOM ── */
  dressing_mirror:{name:'mirror',art:'the',room:'dressing_room',fixed:true,
    desc:()=>`A large mirror framed with bulbs, three of which have died and one of which flickers like a nervous understudy. The glass has a crack across one corner - seven years' bad luck, allegedly, though you've had worse from a good review. ${G.flags.made_up?'Your face, made up, looks back at you: ready, for once.':'Your own anxious, un-made-up face looks back. You could put your make-up on here.'}`,
    take_resp:`The mirror is screwed to the wall and besides, you have quite enough trouble with your own reflection without carrying it about.`},
  flowers:{name:'wilting flowers',art:'some',room:'dressing_room',fixed:true,
    desc:`A small bunch of carnations, wilting bravely in a jam jar. The card reads: "To whoever ends up going on. Good luck. You'll need it. - The Company." It is not, when you think about it, the warmest sentiment ever committed to card, but it is the only one you've had, so you treasure it.`,
    take_resp:`You leave the flowers where they are. They're the only ones you've ever been sent and you're not about to manhandle them.`},
  telegram:{name:'telegram',art:'a',room:'dressing_room',fixed:true,
    desc:`A telegram, yellowed and ancient, pinned to the wall by some long-gone occupant and left as a sort of talisman. It reads: "BREAK A LEG STOP NOT LITERALLY STOP REMEMBER WHAT HAPPENED TO REGINALD STOP". Nobody currently in the building knows who Reginald was, but everyone observes a respectful caution on the stairs.`,
    take_resp:`The telegram has been pinned here longer than you've been alive. It would feel like grave-robbing.`},
  /* ── FIXED SCENERY: CORRIDOR ── */
  call_board:{name:'call-board',art:'the',room:'corridor',fixed:true,
    desc:()=>`The call-board, where the company's fate is pinned daily in curling notices. Today's running order is here, along with a hand-written addition in the Stage Manager's furious capitals: "MISS VANE NOT SIGNED IN. UNDERSTUDY STANDBY. GOD HELP US ALL." Beneath that, smaller: "Whoever keeps whistling in the corridor will be DEALT WITH."\n\nThere's also the nightly notice every theatre keeps: "BEGINNERS' CALL 7:15. CURTAIN 7:30."`,
    take_resp:`The call-board stays on the wall. To remove it would be to tempt a fate even this building doesn't deserve.`},
  fire_bucket:{name:'fire bucket',art:'a',room:'corridor',fixed:true,
    desc:`A red-painted bucket of sand hanging on a bracket, in case of fire, dropped cigarettes, or - the building's history suggests - the occasional pyrotechnic Macbeth. The sand has a single cigarette end in it from approximately the Coronation. You could rummage in it, you suppose, if you were the rummaging sort.`},
  playbills:{name:'old playbills',art:'some',room:'corridor',fixed:true,
    desc:`A row of framed playbills down the corridor wall, charting the Marwood Empire's long slide from "PROVINCIAL TRIUMPH" to "PROVINCIAL". Pantomimes, melodramas, a 1958 "Hamlet" the local paper called "ambitious". One frame is conspicuously turned to face the wall; nobody will say why, but it's the Scottish one, and you know better than to turn it round.`,
    take_resp:`The playbills are the building's memory. You leave them hanging.`},
  /* ── FIXED SCENERY: PROMPT CORNER ── */
  prompt_desk:{name:'prompt desk',art:'the',room:'prompt_corner',fixed:true,
    desc:`The prompt desk in the corner of stage left: a little shelf with a hooded lamp, a panel of coloured cue-lights (RED for standby, GREEN for go), and the worn book-rest where the prompt copy lives during a show. From here Miss Quill can see the whole stage and most of the actors' mistakes before they make them.`,
    take_resp:`The prompt desk is the nerve centre of the entire performance. It is not going in your pocket.`},
  cue_lights:{name:'cue-lights',art:'the',room:'prompt_corner',fixed:true,
    desc:()=>`Two little bulbs in a brass housing: RED for "stand by", GREEN for "go". Right now the red one is lit and has been for some minutes, which in theatre terms is roughly the emotional equivalent of a smoke alarm. ${G.flags.show_ready?'Any moment now, that green light is going to mean you.':'Until somebody can actually go on, green is a distant dream.'}`,
    take_resp:`Tampering with the cue-lights is how wars start backstage. Hands off.`},
  iron_curtain:{name:'safety curtain',art:'the',room:'prompt_corner',fixed:true,
    desc:`The iron - the great fireproof safety curtain that separates stage from auditorium, painted with an advert for a ginger beer that stopped being made in 1962. By law it must be raised and lowered at every performance to prove it works. Through the gap at the bottom you can hear the audience: a low, expectant, slightly restless murmur. They have paid. They are waiting.`,
    take_resp:`The safety curtain weighs roughly as much as a small whale and is the only thing standing between the audience and a building fire. It stays.`},
  /* ── FIXED SCENERY: WINGS ── */
  fly_ropes:{name:'fly ropes',art:'the',room:'wings',fixed:true,
    desc:`A wall of hemp ropes running up into the darkness of the fly tower, each cleated off and labelled in fading chalk: "CLOTH 1", "BORDER", "CHANDELIER (HEAVY!!)". This is how scenery flies in and out. A sign reads "FLYING IS FOR QUALIFIED CREW ONLY", which has the slightly hopeful tone of a sign that has been comprehensively ignored for a century.`,
    take_resp:`You give a rope a speculative tug. Something enormous shifts in the darkness above you. You let go immediately and decide that flying scenery is, in fact, for qualified crew only.`},
  stage_weights:{name:'stage weights',art:'some',room:'wings',fixed:true,
    desc:`A stack of cast-iron stage weights - flat slabs with a handle, used to stop scenery and over-confident actors from falling over. Heavy, honest, and faintly reassuring. One of them is doing nothing in particular, but the rest are clearly holding something important down and you decide not to investigate which.`,
    take_resp:`A stage weight is, by design, extremely heavy and pointedly not for carrying about. That's the whole idea of it.`},
  scenery_flats:{name:'scenery flats',art:'some',room:'wings',fixed:true,
    desc:`Painted canvas flats stacked against the wall, waiting to become the parlour, the garden, and (optimistically) "ELSEWHERE". From the front they're a convincing stately home; from here they're timber, canvas, and a great deal of clever brown paint. The illusion, like most theatrical illusions, depends entirely on you not being allowed backstage.`,
    take_resp:`The flats are twelve feet tall and belong on stage, not under your arm.`},
  lost_umbrella:{name:'forgotten umbrella',art:'a',room:'wings',fixed:true,
    desc:`A black umbrella, furled, leaning in the corner of the wings where someone left it after a wet matinee in - the dust suggests - living memory. It is not a clue. It is not part of any puzzle. It is simply an umbrella that has achieved a kind of immortality through being forgotten. You find this oddly moving.`,
    take_resp:`You don't need an umbrella. It hasn't rained on this stage since the roof was fixed, which is to say it may well rain on this stage, but not tonight.`},
  /* ── FIXED SCENERY: STAGE ── */
  footlights:{name:'footlights',art:'the',room:'stage',fixed:true,
    desc:()=>`A row of footlights along the lip of the stage, throwing their warm glow up at where an actor's face ought to be. ${G.flags.lights_fixed?'They blaze cheerfully now, the whole stage washed in honest gold.':'They\'re lit, but dimly - the main board is dead, so half the rig is out and the stage sits in a sad half-light. You can\'t perform in this.'}`,
    take_resp:`The footlights are bolted into the lip of the stage and wired into the building. Also they're hot. Leave them.`},
  the_set:{name:'the set',art:null,room:'stage',fixed:true,
    desc:`The set for "A Parlour in Petersfield": a painted drawing-room with three doors (comedies always have at least three doors, for the slamming), a chaise, a fake fireplace, and a French window through which characters arrive at exactly the wrong moment. A side table holds a decanter of cold tea masquerading as brandy. It is, in the gentle theatre half-light, almost convincing.`,
    take_resp:`You can't take the set. You're meant to act on it, ideally quite soon.`},
  the_curtain:{name:'house curtain',art:'the',room:'stage',fixed:true,
    desc:`The great red house curtain, hanging in heavy velvet swags, frayed at the hem where a hundred years of feet have brushed it. Behind it, the safety curtain; behind that, the audience. When it rises, it rises on you. The thought produces a sensation in your stomach like a lift with the cable cut.`,
    take_resp:`The house curtain weighs a great deal and is, fairly literally, the thing the whole evening hangs on. It stays.`},
  auditorium:{name:'auditorium',art:'the',room:'stage',fixed:true,
    desc:()=>`Beyond the footlights, dimly, the auditorium: rank upon rank of red plush seats rising into the dark, most of them - tonight, miraculously - full. Eight hundred people who have left their homes on a damp evening to be told a story. A baby is grizzling in the circle. Somebody unwraps a sweet with the slow, doomed stealth of the truly committed. ${G.flags.show_ready?'They are ready. The only question left is whether you are.':'They don\'t yet know the night is hanging by a thread. You intend to keep it that way.'}`,
    take_resp:`You cannot take the audience. Tempting though it is to simply gather them up and explain that tonight might be tricky.`},
  /* ── FIXED SCENERY: GREEN ROOM ── */
  urn:{name:'tea urn',art:'the',room:'green_room',fixed:true,
    desc:()=>{
      if(G.flags.cocoa_made)return `The great steel tea urn, vindicated and gently steaming, having produced one perfect mug of cocoa. It looks insufferably pleased with itself.`;
      if(G.flags.urn_filled)return `The tea urn, now full of water and freshly switched on, ticking and gurgling its way up to a boil. All it needs now is the cocoa-making: water, the tin of cocoa on the shelf, and milk - which you don't yet have.`;
      return `An enormous, ancient steel tea urn, the beating heart of any theatre's morale. It is currently empty, switched off, and sulking. There's a tap at the bottom and a hinged lid at the top. It wants water in it before it'll do anything at all. Get that going and you're most of the way to a hot drink.`;
    },
    take_resp:`The urn holds three gallons and weighs accordingly. It is not leaving this room and frankly neither is anyone who tries to make it.`},
  green_sofa:{name:'sagging sofa',art:'the',room:'green_room',fixed:true,
    desc:`A vast, sagging chintz sofa, the colour of stewed tea, into which generations of resting actors have sunk and from which several were rumoured never to return. It exhales a small puff of dust and old anecdotes when you look at it. Sitting on it before a show is considered, by the superstitious, a way of inviting the evening to also collapse.`,
    take_resp:`The sofa weighs as much as the urn and has, if anything, stronger opinions about staying put.`},
  biscuit_tin:{name:'biscuit tin',art:'a',room:'green_room',fixed:true,
    desc:`A battered Quality Street tin that has not contained Quality Street, or indeed any street of any quality, since management instituted "economies". It now contains: a single broken bourbon, a button, and the crushing weight of company morale. Opening it is one of theatre's small, recurring tragedies.`,
    take_resp:`The tin is empty of everything but disappointment, which is not worth carrying.`},
  cocoa_tin:{name:'tin of cocoa',art:'a',room:'green_room',fixed:true,
    desc:`A dented tin of cocoa powder on the green-room shelf, survivor of the economies because nobody likes cocoa quite enough to finish it. There's plenty left. With hot water and a drop of milk, this becomes the most valuable substance in the building.`,
    take_resp:`No need to pocket the whole tin - it lives by the urn. The cocoa-making happens here, once you've got water heating and some milk.`},
  empty_mug:{name:'"WORLD\'S MOST MEDIOCRE UNDERSTUDY" mug',art:'a',room:'green_room',
    desc:`A chipped mug from the green-room shelf, reading WORLD'S MOST MEDIOCRE UNDERSTUDY in fading letters. "Most Mediocre" - not best, not worst, just... present, and acceptable, and reliably overlooked. It was a Secret Santa gift three years ago and you have never been entirely sure whether it was a kindness or a diagnosis. Either way, it's clearly yours, and it'll do nicely for a hot drink when the time comes.`,
    use_resp:`It's a mug. Its destiny is to hold cocoa. Get the urn going and the milk sorted, and it'll have its big moment.`},
  /* ── FIXED SCENERY: WARDROBE ── */
  costume_rails:{name:'costume rails',art:'the',room:'wardrobe',fixed:true,
    desc:`Rails and rails of costumes receding into fragrant gloom: doublets, crinolines, a pantomime cow (rear half only, the front half being "in litigation"), and an entire regiment of identical butler's tailcoats. The smell is pure theatre - mothballs, face powder, sweat, and glamour, in roughly that order.`,
    take_resp:`You can't cart off the rails, and the only costume you actually need is locked in Miss Vane's room.`},
  mannequin:{name:'tailor\'s dummy',art:'a',room:'wardrobe',fixed:true,
    desc:`A headless tailor's dummy on a wooden pole, wearing a half-pinned ballgown and an air of patient suffering. Mrs Tassel calls her "Deirdre" and talks to her more than to most of the company. Deirdre has heard every secret in this building and, being headless, has kept them all.`,
    take_resp:`Deirdre stays. She has tenure.`},
  sewing_box:{name:'sewing box',art:'a',room:'wardrobe',fixed:true,
    desc:()=>G.flags.threader_returned
      ?`Mrs Tassel's sewing box, open and busy again now her needle-threader is back in it: pins, threads, a pincushion shaped like a tomato, and a pair of scissors sharp enough to settle arguments. Order has been restored.`
      :`Mrs Tassel's sewing box: pins, threads, a tomato pincushion, scissors. But there's a needle-threader-shaped gap in it, and a half-threaded needle abandoned in frustration. She can't get on without it - she squints at the eye of the needle and her eyes, she'll tell you, "aren't what they were."`,
    take_resp:`The sewing box is Mrs Tassel's domain and she'd have your hand off. The threader that's missing from it, though - that's worth tracking down.`},
  pressing_iron:{name:'pressing iron',art:'a',room:'wardrobe',fixed:true,
    desc:`A heavy flat-iron heating on a little stand, for the eternal war against creases. Mrs Tassel can press a costume so sharp you could open letters with it. Best not to touch it; it's hot, and the last person who borrowed it without asking is, she says darkly, "no longer with the company."`,
    take_resp:`The iron is hot and spoken for. You value your hand and your standing with Wardrobe.`},
  /* ── FIXED SCENERY: PROP STORE ── */
  prop_shelves:{name:'shelves of props',art:'the',room:'prop_store',fixed:true,
    desc:`Floor-to-ceiling shelves of props, the glorious lumber-room of a hundred forgotten shows: rubber daggers, papier-mâché skulls, a tray of paste jewels, three crowns of varying royalty, a telephone with no wire, a leg of ham made of painted wood, and a drawer marked "ELECTRICAL - PROBABLY" that rattles with mystery. It's the kind of place where you came in for one thing and leave having found three.`,
    take_resp:`You can't take "the shelves". Look for specific things on them - the mascot, and a rummage in that electrical drawer might pay off.`},
  electrical_drawer:{name:'electrical drawer',art:'the',room:'prop_store',fixed:true,
    desc:()=>G.flags.fuse_taken
      ?`The drawer marked "ELECTRICAL - PROBABLY", now minus one spare fuse. Otherwise: a bag of dead bulbs, a doorbell, and a transformer humming to itself in a way that no transformer should when nothing is plugged into it.`
      :`A drawer marked "ELECTRICAL - PROBABLY", rattling with the orphaned electrical guts of decades. Among the dead bulbs and orphan plugs, something useful catches your eye: a chunky spare fuse, the cartridge kind. The sort of thing a broken lighting board might be crying out for.`,
    take_resp:`Take what's useful from inside it rather than the drawer itself - there's a spare fuse in there worth having.`},
  stage_coffin:{name:'stage coffin',art:'a',room:'prop_store',fixed:true,
    desc:`A property coffin propped upright in the corner, last used in the 1958 "Hamlet" and pressed into service every panto since as everything from a wardrobe to a submarine. The lid creaks open invitingly. You lift it. Inside: half a bag of fake snow and a note reading "IF YOU'RE READING THIS, IT'S NOT YOUR TURN YET." Theatre humour. Nobody knows who wrote it. Everyone leaves it.`,
    take_resp:`A coffin is heavy, unlucky to move without good reason, and you have quite enough on tonight without explaining to anyone why you're carrying one.`},
  apple_barrel:{name:'barrel of fake apples',art:'a',room:'prop_store',fixed:true,
    desc:`A barrel of property apples, wax and wooden, polished to a shine that real fruit never achieves. They turn up in every other production - orchards, market scenes, the occasional ill-advised modern "Eden". One of them has a bite mark in it from an actor who, mid-show, forgot they weren't real. The bite mark is now itself a treasured prop.`,
    take_resp:`A wooden apple is a sad thing to carry and no use to anyone. You leave the barrel to its shiny, inedible abundance.`},
  /* ── FIXED SCENERY: STAGE DOOR ── */
  key_board:{name:'key board',art:'the',room:'stage_door',fixed:true,
    desc:()=>`A board of hooks behind Albert's counter, each hung with a labelled key: GREEN ROOM, WARDROBE, FLIES, BOX OFFICE, and - on the central hook, gleaming with importance - PROP STORE. ${G.flags.has_prop_key?'The prop-store hook is empty now; the key is in your pocket, where Albert can keep a sorrowful eye on it.':'Albert guards this board the way a dragon guards gold, and with much the same warmth toward visitors.'}`,
    take_resp:`Reaching over Albert's counter to help yourself to a key would be, in his view, a hanging offence. The keys go through him or not at all.`},
  signing_book:{name:'signing-in book',art:'the',room:'stage_door',fixed:true,
    desc:()=>`The signing-in book, in which every soul entering the building must record their arrival, so that in the event of fire the brigade knows exactly who to look sad about. Tonight's page tells the story: the whole company signed in by 6:45 - except, in the line marked C. VANE, a damning blank. ${G.flags.knows_vane_hiding?'Though you happen to know she did come in. She just never came past Albert.':'Wherever Miss Vane is, officially, she isn\'t here at all.'}`,
    take_resp:`The signing-in book is sacred and, in a fire, legally significant. It stays on Albert's counter.`},
  keepers_flask:{name:"Albert's flask",art:'a',room:'stage_door',fixed:true,
    desc:`A dented tartan thermos flask on Albert's counter, the companion of his every shift. Tonight, tragically, it is empty, and the green-room urn that would refill it is on strike. A keeper without his hot drink is a keeper with nothing to live for and nothing to lose, which makes Albert, currently, a dangerous man to need a favour from.`,
    take_resp:`You'd no sooner take Albert's flask than poke a sleeping bear. Whatever's wrong, it's not solved by stealing the man's thermos.`},
  /* ── FIXED SCENERY: BOX OFFICE ── */
  seating_plan:{name:'seating plan',art:'the',room:'box_office',fixed:true,
    desc:()=>G.flags.brenda_helped
      ?`The big seating plan, now perfectly legible to Brenda again, the VIP party safely inked into the front row of the circle. Crisis averted; milk released.`
      :`A large gridded seating plan of the auditorium, every seat a little box to be ticked. Brenda is hunched over it in despair: a VIP party is due and she cannot, she says, read the tiny seat numbers to place them - "It's the print, it's got smaller, they print everything smaller now." She is holding the plan at arm's length and then very close, and getting nowhere.`,
    take_resp:`The seating plan is Brenda's whole world tonight and she would not thank you for taking it. Helping her read it, now - that might be another matter.`},
  mini_fridge:{name:'mini-fridge',art:'a',room:'box_office',fixed:true,
    desc:()=>G.flags.has_milk
      ?`The box-office mini-fridge, humming. The milk's gone with you; what remains is a sad lunchbox and a yoghurt that has, Brenda says, "gone past being a yoghurt and into being a lifestyle."`
      :`A small fridge under the box-office counter, humming bravely. Inside: a bottle of milk (the building's only milk, Brenda guards it jealously), a packet of sandwiches labelled BRENDA - NOT YOU, and a yoghurt of indeterminate age. The milk is exactly what the keeper's cocoa needs - but Brenda won't part with it for nothing.`},
  cash_drawer:{name:'cash drawer',art:'the',room:'box_office',fixed:true,
    desc:`The box-office cash drawer, or "the float", which Brenda counts twice before and twice after every show with the devotion of a monk and the suspicion of a customs officer. It contains tonight's takings and a button somebody once tried to pass off as a fifty-pence piece. Do not, the very air suggests, even think about it.`,
    take_resp:`You wouldn't dream of it, and Brenda's eyes haven't left you since you looked at it. Move along.`},
  /* ── FIXED SCENERY: DIVA'S ROOM ── */
  star_chaise:{name:'chaise longue',art:'a',room:'diva_room',fixed:true,
    desc:`A red velvet chaise longue, button-backed and faintly threadbare, on which Cordelia Vane has reclined in tragic glory between scenes for fifteen years. There's a still-warm dent in the cushions in the precise shape of a woman who, whatever the signing-in book says, is very much in the building.`,
    take_resp:`The chaise stays. It is practically Cordelia's co-star.`},
  vane_photos:{name:'wall of photographs',art:'a',room:'diva_room',fixed:true,
    desc:`Every inch of wall is Cordelia: Cordelia as Lady Macbeth, as Hedda, as the back end of nothing whatsoever because Cordelia has never played the back end of anything. Young Cordelia, dazzling. Recent Cordelia, still dazzling but with a wariness in the eyes the early photos don't have. Taken together they tell the story of a career, and - if you look closely - of someone increasingly frightened of the next one not being as good.`,
    take_resp:`You leave her photographs alone. There's something private about them, for all that they cover every wall.`},
  locked_costume:{name:'star costume',art:'the',room:'diva_room',fixed:true,
    desc:()=>G.flags.has_costume
      ?`The empty costume bag swings on the rail; the gown itself is on you now, taken in with three deft safety-pinned tucks by Mrs Tassel. You are, at last, dressed for the part.`
      :G.inv.includes('star_gown')||G.flags.costume_freed
      ?`The rail stands open, its little padlock unpicked, the garment bag empty and swinging. The gown is over your arm now - it just needs taking in to fit. Mrs Tassel in the wardrobe is the woman for that.`
      :`The lead's costume for Act One, sealed in a garment bag and padlocked to a rail: a midnight-blue evening gown that probably cost more than your annual wage as an understudy. This is what you'd have to wear to go on. The padlock is the small, flimsy, ornamental kind - the sort you could unpick with a sturdy pin if you knew the trick (USE PIN ON LOCK) - but you'd want Wardrobe's blessing, and Cordelia's, before laying a finger on her gown.`},
  half_note:{name:'half-written note',art:'a',room:'diva_room',fixed:true,
    desc:`A sheet of the theatre's headed paper on the dressing table, weighted with a powder compact. In Cordelia's grand looping hand it begins: "To the Company - By the time you read this I shall have - " and then stops, the pen abandoned mid-flourish. It is not, you realise with a small cold shock, a suicide note. It's a resignation note. She means to walk out. She means to never go on again. And she couldn't even finish telling you why.`,
    take_resp:`You don't take the note. Whatever it is, it's hers to finish or not.`},
  /* ── FIXED SCENERY: LIGHTING BOX ── */
  lighting_board:{name:'lighting board',art:'the',room:'lighting_box',fixed:true,
    desc:()=>{
      if(G.flags.lights_fixed)return `The lighting board, alive again, its rows of dimmer levers glowing and ready. The new fuse did the trick. From up here you could light the whole stage with a push of your hand - and in a few minutes, you will.`;
      if(G.inv.includes('spare_fuse'))return `The main lighting board, dead as a doornail: every lever down, every indicator dark. You pop the cover. There's the trouble - the main fuse holder, gaping and empty. And you, as it happens, are holding a spare fuse. Try USE FUSE, or FIT FUSE.`;
      return `The main lighting board, dead as a doornail. Every dimmer lever is down and every little indicator light is out. You pop the cover and peer in: the main fuse holder is empty - somebody's pinched the fuse, or it blew and was never replaced. Find a spare fuse and you could bring the whole rig back to life.`;
    },
    take_resp:`The lighting board is a wall of switches wired into the building's bones. You're not taking it; you're trying to fix it.`},
  follow_spot:{name:'follow-spot',art:'the',room:'lighting_box',fixed:true,
    desc:()=>`The follow-spot: a great snub-nosed lantern on a swivel, the light that picks one person out of the dark and says to eight hundred strangers, "watch this one." ${G.flags.lights_fixed?'It hums, warm and ready, trained on the centre of the stage. On you, if you can only get there.':'Dead, for now, like everything else up here, until the board has power.'} The operator's stool beside it is empty; whoever should be here is conspicuously, infuriatingly not.`,
    take_resp:`The follow-spot is bolted to the gallery rail and weighs a ton. Its job is to point at you, not to be carried by you.`},
  gallery_window:{name:'gallery window',art:'the',room:'lighting_box',fixed:true,
    desc:`The little window of the lighting box looks down over the whole auditorium and stage, the god's-eye view. From up here the audience is a single restless creature breathing in the dark, and the empty stage waits in its sad half-light like a held breath. It is, you think, the most frightening and most wonderful view in the building.`,
    take_resp:`It's a window. It stays in its wall.`},
  /* ── FIXED SCENERY: DIRECTOR'S OFFICE ── */
  director_desk:{name:'cluttered desk',art:'a',room:'director_office',fixed:true,
    desc:()=>`The Director's desk, a midden of despair: a cold cup of tea, a telephone off its hook (a tinny voice still occasionally enquiring "Hello? Hello?"), a bottle of something medicinal, and - clutched to his chest, mostly - the annotated Book. ${G.flags.has_book?'':'He won\'t let go of the Book while the world is ending. Steady his world, and he might.'}`,
    take_resp:`Rifling the Director's desk while he weeps into it would be poor form. What you need from here is the Book, and that means dealing with the man holding it.`},
  glory_posters:{name:'posters of past glories',art:'some',room:'director_office',fixed:true,
    desc:`The walls are papered with the Director's better days: a West End transfer (1971), a touring "Importance" the Guardian called "spry", a season at the Old Vic he mentions on average once per conversation. The posters get newer toward the door and then, abruptly, stop, around the time the bookings dried up and he washed ashore here at the Marwood, to which he has given everything and from which he asks only that, tonight, it does not actively betray him.`,
    take_resp:`You leave his glory days on the wall. He needs them there.`},
  scathing_review:{name:'framed review',art:'a',room:'director_office',fixed:true,
    desc:`A framed newspaper review, hung - bafflingly - in pride of place. You read it. It is, line by line, the single most savage notice ever printed about any production anywhere: "an evening of theatre in the way that a car crash is an evening out." At the bottom, in the Director's hand: "He was WRONG. - and the show ran two years." It is, you understand, the most important thing in the room. It is the reason he keeps going.`,
    take_resp:`That review is load-bearing, emotionally. It stays exactly where it is.`},
  set_model:{name:'model of the set',art:'a',room:'director_office',fixed:true,
    desc:`A little cardboard model of tonight's set, complete with tiny painted doors and a thumbnail-sized chaise, the way directors plan a show before a single real plank is cut. There are tiny paper figures for the cast. One of them - the lead - has been very deliberately turned to face away from the audience. You suspect this was done tonight, and not by accident, and your heart goes out to the small turned-away figure and the large real one clutching the Book.`,
    take_resp:`You leave the model be. It's the show as he dreamed it, and tonight's reality is being unkind enough to it already.`},
};

const ROOMS={
  dressing_room:{
    name:"The Understudy's Dressing Room",
    desc_l:()=>`It is fourteen minutes to curtain, and you are in the smallest dressing room in the building - a converted broom cupboard on the wrong side of the corridor, which the management calls "intimate" and everyone else calls "the cupboard".\n\nThere's just room for a chair, a narrow bench, and a mirror framed with bulbs, three of them dead. A jam jar of wilting carnations stands in for the bouquets you've never had. A drab understudy's frock hangs on the back of the door - though, you remind yourself, tonight you may need something rather grander.\n\nSomewhere out front, through the walls, eight hundred people are settling into their seats with the low roar of a sea coming in. Miss Vane has vanished. The Director is, by all accounts, in pieces. And you - you, who have understudied this part for three seasons and never once gone on - are the only person in the building who knows the lines.\n\nMostly knows the lines. There is the small matter of Act Three.`,
    desc_s:`Your cramped dressing room - the cupboard. Mirror, bench, wilting flowers, your script. The corridor lies east, and the whole anxious building beyond it.`,
    exits:{east:'corridor',e:'corridor',out:'corridor',corridor:'corridor','leave':'corridor','exit':'corridor'},
    feats:{
      mirror:()=>typeof ITEMS.dressing_mirror.desc==='function'?ITEMS.dressing_mirror.desc():ITEMS.dressing_mirror.desc,
      bulbs:`The bulbs around the mirror: a row of them, three dead, one flickering bravely. Theatre runs on these - and on people who keep going with three of their lights out, which on reflection is most of the company.`,
      flowers:`A small bunch of carnations wilting in a jam jar. The card reads "To whoever ends up going on. Good luck. You'll need it. - The Company." It is the only bouquet you have ever received and you would not swap it for a barrowload of roses. You might be lying about that.`,
      bench:`The narrow make-up bench: a litter of brushes, a tin of cold cream, a powder puff that has seen service, and your stick of greasepaint. Everything an actor needs to turn a frightened face into a brave one.`,
      frock:`The understudy's frock on the back of the door: serviceable, grey, and designed to be unmemorable in a crowd scene. Not, you suspect, what the leading lady wears in Act One. If you're really going on, you'll need her costume - and that's locked in her room.`,
      chair:`A bentwood chair with one slightly short leg, which means it rocks, which means you have spent three seasons rocking gently in it waiting for a call that never came. Tonight, perhaps, it comes.`,
      telegram:`A yellowed telegram pinned to the wall by a previous occupant: "BREAK A LEG STOP NOT LITERALLY STOP REMEMBER WHAT HAPPENED TO REGINALD STOP." A salutary warning, even if the specifics are lost to history.`,
      door:`The dressing-room door, with your frock on the back of it and a card slotted into the little brass holder that reads "UNDERSTUDY" - not even your name. East takes you out into the corridor.`,
    },
    npcs:[]
  },
  corridor:{
    name:"The Backstage Corridor",
    desc_l:`The backstage corridor: a long, dim spine of a passage with a sloping floor, lined with doors and a century of framed playbills. A bare bulb buzzes overhead. The walls are painted the particular institutional green that theatres and hospitals agree, against all evidence, is calming.\n\nThe call-board hangs here, where the company's fate is pinned each day. A red fire bucket of sand sits on its bracket. From every direction comes the muffled orchestra of a theatre fifteen minutes from curtain: the orchestra itself tuning in the pit, footsteps overhead, a distant despairing voice that can only be the Director.\n\nLabelled doors lead off in all directions - green room, wardrobe, box office, the locked prop store, Miss Vane's star room, the prompt corner toward the stage, the stage door, and a short flight up to the Director's office - into the working heart of the Marwood Empire. Type EXITS at any time to see them listed.`,
    desc_s:`The dim backstage corridor, doors on every side, playbills on the walls, the call-board and fire bucket to hand. The whole building turns off this passage.`,
    exits:{
      west:'dressing_room',w:'dressing_room','dressing room':'dressing_room','cupboard':'dressing_room',
      north:'green_room',n:'green_room','green room':'green_room',
      south:'prompt_corner',s:'prompt_corner','prompt corner':'prompt_corner','prompt':'prompt_corner',
      east:'stage_door',e:'stage_door','stage door':'stage_door',
      'wardrobe':'wardrobe',
      'box office':'box_office','box':'box_office','box-office':'box_office',
      'director':'director_office',"director's office":'director_office','office':'director_office',
      up:'director_office',u:'director_office',
      'prop store':'prop_store','prop-store':'prop_store','propstore':'prop_store','store':'prop_store','props':'prop_store',
      "miss vane's room":'diva_room','vane':'diva_room','diva':'diva_room','star':'diva_room','star dressing room':'diva_room',"cordelia's room":'diva_room','diva room':'diva_room',
    },
    feats:{
      'call-board':()=>typeof ITEMS.call_board.desc==='function'?ITEMS.call_board.desc():ITEMS.call_board.desc,
      'call board':()=>typeof ITEMS.call_board.desc==='function'?ITEMS.call_board.desc():ITEMS.call_board.desc,
      board:()=>typeof ITEMS.call_board.desc==='function'?ITEMS.call_board.desc():ITEMS.call_board.desc,
      'fire bucket':ITEMS.fire_bucket.desc,
      bucket:ITEMS.fire_bucket.desc,
      playbills:ITEMS.playbills.desc,
      playbill:ITEMS.playbills.desc,
      posters:ITEMS.playbills.desc,
      bulb:`The bare bulb buzzing overhead, doing the work of three. A backstage corridor is never quite dark and never quite light; it exists in a permanent state of dress-rehearsal dusk.`,
      draught:`There's a cold spot here, halfway down the corridor, that no amount of draught-excluder has ever cured. The old hands walk round it without noticing they're doing it. Stand in it and the hairs on your arms lift, and you understand, suddenly and completely, why nobody whistles back here. You step round it too.`,
      'cold spot':`The famous corridor cold spot. The Grey Lady's, they say. You don't believe in ghosts. You also, you notice, do not stand in it.`,
      walls:`The institutional green paint of the corridor walls, applied at some point in the 1950s and never since, on the theory - shared by theatres, hospitals and prisons - that green is "restful". It is not restful. It is the colour of a faintly anxious cabbage. Generations of actors have stared at it while waiting to go on and found in it a companionable fellow-sufferer.`,
      'green paint':`The institutional green paint of the corridor, the colour of a faintly anxious cabbage. Restful, in theory. Companionable, in practice. Restful, never.`,
      floor:`The sloping wooden floor, worn into a shallow valley down the middle by a hundred years of hurrying feet. You could walk it blindfold, which is just as well, given the lighting.`,
      doors:`Doors everywhere, each with its painted label: the GREEN ROOM north; the PROMPT CORNER south toward the stage; the STAGE DOOR east where Albert keeps his grim vigil; and, ranged along the passage, the WARDROBE, the BOX OFFICE, the PROP STORE (locked), and MISS VANE'S room with its gold star. Up a short flight at the end is the DIRECTOR'S office. The whole building turns off this one passage.`,
    },
    npcs:[]
  },
  prompt_corner:{
    name:"The Prompt Corner",
    desc_l:`You step through into the prompt corner, stage left, in the wings proper now - the magical, terrifying strip of darkness from which the lit world of the stage is reached. The air smells of dust, size, and a hundred years of held breath.\n\nThe prompt desk is here, with its hooded lamp and panel of cue-lights, currently glowing an ominous standby red. Beside it looms the great iron safety curtain, lowered, with the audience murmuring behind it like the sea behind a harbour wall.\n\nMiss Quill, the prompter, sits at her desk with the stillness of a heron, the prompt copy open before her, watching the dark where the actors ought to be.\n\nThe stage itself lies west, beyond the iron. The wings open out to the south. The corridor is back to the north.`,
    desc_s:`The prompt corner in the wings, stage left. The prompt desk glows standby-red. The iron curtain looms; the audience mutters behind it. Miss Quill keeps her watch.`,
    exits:{
      north:'corridor',n:'corridor',corridor:'corridor','back':'corridor',
      west:'stage',w:'stage',stage:'stage','onstage':'stage','on stage':'stage',
      south:'wings',s:'wings',wings:'wings',
    },
    feats:{
      'prompt desk':ITEMS.prompt_desk.desc,
      desk:ITEMS.prompt_desk.desc,
      'cue-lights':()=>typeof ITEMS.cue_lights.desc==='function'?ITEMS.cue_lights.desc():ITEMS.cue_lights.desc,
      'cue lights':()=>typeof ITEMS.cue_lights.desc==='function'?ITEMS.cue_lights.desc():ITEMS.cue_lights.desc,
      lights:()=>typeof ITEMS.cue_lights.desc==='function'?ITEMS.cue_lights.desc():ITEMS.cue_lights.desc,
      'safety curtain':ITEMS.iron_curtain.desc,
      iron:ITEMS.iron_curtain.desc,
      curtain:ITEMS.iron_curtain.desc,
      lamp:`The prompt desk's hooded lamp, throwing a small disc of light onto the prompt copy and nothing else - the prompter must see the page but never the audience the page. A neat little metaphor, if you're in the mood, which fifteen minutes from curtain you are emphatically not.`,
      lemonade:`A glass of flat lemonade on the corner of the prompt desk, going slowly warm. Miss Quill has nursed the same glass through a thousand performances. It is less a drink than a companion.`,
      'ghost light':`In the centre of the dark stage, just visible past the iron, stands a single bare bulb on a tall stand: the ghost light, left burning on every stage in the world when the theatre sleeps, so that - depending who you ask - the ghosts can see to perform their own midnight repertoire, or simply so the first person in doesn't fall into the orchestra pit. Miss Quill, following your gaze, murmurs: "Both reasons are true. That's theatre for you."`,
      ghost:`You ask Miss Quill, half-joking, whether the Marwood has a ghost. She does not look up. "The Grey Lady," she says, as though confirming the weather. "Walks the circle on first nights. Sat in the royal box through the whole of 'Hamlet' in '58 and left before the curtain call, which the critic also did, so make of that what you will." A pause. "She likes a good house. She'll be pleased tonight, if you don't let her down."`,
    },
    npcs:['prompter']
  },
  wings:{
    name:"The Wings",
    desc_l:`Deeper into the wings: the backstage no-man's-land where scenery waits, ropes vanish upward into infinite darkness, and actors stand in the gloom turning slowly green with nerves before stepping into the gold.\n\nA wall of hemp fly-ropes runs up into the fly tower overhead, each cleated and chalk-labelled. A stack of cast-iron stage weights sits by the wall; painted scenery flats lean in ranks, stately homes seen from the wrong side. A single forgotten umbrella leans in the corner, immortal.\n\nFrom here you can see the edge of the stage to the west, washed in its sad half-light. The prompt corner is back to the north. Somewhere above, in the flies, something flutters - a pigeon, probably; there's always a pigeon.`,
    desc_s:`The wings: fly-ropes climbing into the dark, stage weights, ranked scenery flats, and one immortal umbrella. The stage edge glows west; the prompt corner is north.`,
    exits:{
      north:'prompt_corner',n:'prompt_corner','prompt corner':'prompt_corner','prompt':'prompt_corner',
      west:'stage',w:'stage',stage:'stage','onstage':'stage',
      up:'lighting_box',u:'lighting_box','ladder':'lighting_box','lighting box':'lighting_box','lighting':'lighting_box','flies':'lighting_box','fly gallery':'lighting_box',
    },
    feats:{
      'fly ropes':ITEMS.fly_ropes.desc,
      ropes:ITEMS.fly_ropes.desc,
      rope:ITEMS.fly_ropes.desc,
      'stage weights':ITEMS.stage_weights.desc,
      weights:ITEMS.stage_weights.desc,
      flats:ITEMS.scenery_flats.desc,
      scenery:ITEMS.scenery_flats.desc,
      umbrella:ITEMS.lost_umbrella.desc,
      ladder:`An iron ladder bolted to the wall, climbing up into the fly gallery and the lighting box above. It looks alarming and is, the crew assure you, "perfectly safe, mostly." Up you'd go, if you needed the lights seeing to.`,
      pigeon:`You peer up into the flies. Something pale shifts on a high beam and regards you with one round, idiotic eye. The theatre pigeon. There is always a theatre pigeon. Generations of crew have tried to evict generations of pigeon; the pigeon endures. It is, in its way, the most reliable performer in the building.`,
    },
    npcs:[]
  },
  stage:{
    name:"The Stage",
    desc_l:()=>`You step out of the wings and onto the stage itself, and the whole geography of fear rearranges around you. Here is the place. The boards are scuffed silver where a century of feet have found their marks. The painted parlour rises around you - three doors, a chaise, a French window. The footlights glow along the lip.\n\nBeyond them, past the lowered safety curtain, the auditorium breathes in the dark: rank on rank of seats, tonight near enough full, eight hundred people who do not yet know that the evening is hanging by a thread.\n\n${G.flags.lights_fixed?'The stage blazes now, full and golden - the board is fixed, and every lantern is doing its duty.':'But the stage sits in a dispiriting half-light: the main lighting board is dead, and you cannot, you simply cannot, perform a show in gloom like this.'}\n\nThe wings lie east and south, back into the safe dark.`,
    desc_s:()=>`The stage. The painted parlour, the footlights, the great curtain, the breathing dark of the auditorium beyond. ${G.flags.lights_fixed?'Lit, full and golden, and ready.':'Sunk in a sad half-light - the board is still dead.'} The wings are east.`,
    exits:{
      east:'prompt_corner',e:'prompt_corner','prompt corner':'prompt_corner','prompt':'prompt_corner','off':'prompt_corner','offstage':'prompt_corner',
      south:'wings',s:'wings',wings:'wings',
    },
    feats:{
      footlights:()=>typeof ITEMS.footlights.desc==='function'?ITEMS.footlights.desc():ITEMS.footlights.desc,
      'the set':ITEMS.the_set.desc,
      set:ITEMS.the_set.desc,
      parlour:ITEMS.the_set.desc,
      doors:`The three doors of the parlour set, essential to any drawing-room comedy, through which characters will shortly be required to enter and exit at high speed and exactly the wrong moments. They lead, as all stage doors do, to nowhere - a flat eighteen inches of canvas and then the wings. The audience must never know.`,
      chaise:`The set's chaise longue, where in Act One the leading lady delivers the line about the weather that gets the laugh that tells you whether it's going to be a good house. You will, if all goes well, shortly be the one delivering it. Your stomach performs a slow forward roll at the thought.`,
      'french window':`The French window upstage, through which, on cue, characters arrive bearing news, tennis racquets, or in Act Two a body. Tonight it is merely a window onto a painted garden and the brick back wall of the theatre, but from the front it is the threshold of everything.`,
      curtain:ITEMS.the_curtain.desc,
      'house curtain':ITEMS.the_curtain.desc,
      auditorium:()=>typeof ITEMS.auditorium.desc==='function'?ITEMS.auditorium.desc():ITEMS.auditorium.desc,
      audience:()=>typeof ITEMS.auditorium.desc==='function'?ITEMS.auditorium.desc():ITEMS.auditorium.desc,
      seats:()=>typeof ITEMS.auditorium.desc==='function'?ITEMS.auditorium.desc():ITEMS.auditorium.desc,
      decanter:`The decanter on the set's side table, full of cold stewed tea standing in for brandy, as it has since the dawn of theatre. Every actor knows the tea-brandy. Every actor has, at some low moment, wished it were the real thing.`,
      boards:`The stage boards themselves, scuffed to a soft silver where the marks are, dark with polish elsewhere. "Treading the boards." You have waited three seasons to genuinely tread these. You take a moment to feel them under your feet. They feel like the edge of a diving board.`,
    },
    npcs:[]
  },
  green_room:{
    name:"The Green Room",
    desc_l:()=>`The green room, that curious institution: the place actors wait to be wanted. It is not green, has never been green, and nobody can tell you why it's called that, though everyone has a theory and all the theories are wrong.\n\nA vast sagging chintz sofa dominates one wall. The great steel tea urn presides on a counter, ${G.flags.cocoa_made?'gently steaming in triumph':G.flags.urn_filled?'ticking its way up to the boil':'cold and switched off and sulking'}. A shelf above it holds the tin of cocoa and a row of mismatched mugs. A noticeboard bristles with rotas, complaints, and a single defiant cartoon. The empty biscuit tin sits in state, a monument to better-funded times.\n\nDoors lead back south to the corridor, and through to the wardrobe in the west.`,
    desc_s:()=>`The green room: sagging sofa, the great tea urn (${G.flags.cocoa_made?'triumphant':G.flags.urn_filled?'heating up':'cold and sulking'}), cocoa tin on the shelf, the famously empty biscuit tin. Corridor's south; wardrobe west.`,
    exits:{
      south:'corridor',s:'corridor',corridor:'corridor','out':'corridor','back':'corridor',
      west:'wardrobe',w:'wardrobe',wardrobe:'wardrobe',
    },
    feats:{
      urn:()=>typeof ITEMS.urn.desc==='function'?ITEMS.urn.desc():ITEMS.urn.desc,
      'tea urn':()=>typeof ITEMS.urn.desc==='function'?ITEMS.urn.desc():ITEMS.urn.desc,
      sofa:ITEMS.green_sofa.desc,
      'cocoa tin':ITEMS.cocoa_tin.desc,
      cocoa:ITEMS.cocoa_tin.desc,
      'biscuit tin':ITEMS.biscuit_tin.desc,
      biscuits:ITEMS.biscuit_tin.desc,
      tin:ITEMS.cocoa_tin.desc,
      mugs:`A row of mismatched mugs on hooks: one from a 1979 panto, chipped; one that simply says NO in stern capitals, which belongs to the Stage Manager and which no one has ever dared use; and a faded one reading WORLD'S MOST MEDIOCRE UNDERSTUDY - "most mediocre", note, not best or worst - which is, unmistakably, yours. You could TAKE the most-mediocre-understudy mug; it'll want filling before the night's out.`,
      noticeboard:`The green-room noticeboard, an archaeology of company life: a rehearsal rota three revisions out of date, a stern notice about washing one's own mug, a flyer for a colleague's one-person show about Vita Sackville-West, and a cartoon of the Director weeping, captioned "OPENING NIGHT" - which is either prophetic or just observant.`,
      counter:`The counter where the urn presides, sticky with the ghosts of a thousand teas, ringed with mug-stains like the growth rings of a sad tree. The cocoa tin and the mugs live up here, within easy reach of the urn.`,
    },
    npcs:[]
  },
  wardrobe:{
    name:"The Wardrobe",
    desc_l:()=>{
      let tassel;
      if(G.flags.has_costume)tassel=`Mrs Tassel, the wardrobe mistress, presides over it all from a chair by the work-table, beaming over her handiwork now that she's fitted you into Cordelia's gown - and dabbing, when she thinks you aren't looking, at her eyes.`;
      else if(G.inv.includes('star_gown'))tassel=`Mrs Tassel, the wardrobe mistress, presides over it all from a chair by the work-table, needle threaded and ready, her hands fairly itching to get at the gown over your arm and take it in to fit you.`;
      else if(G.flags.threader_returned)tassel=`Mrs Tassel, the wardrobe mistress, presides over it all from a chair by the work-table, her silver threader back where it belongs and her needle threaded at last - ready and waiting for you to bring her Cordelia's gown.`;
      else tassel=`Mrs Tassel, the wardrobe mistress, presides over it all from a chair by the work-table, a half-threaded needle held up to the light and an expression of mounting despair upon her kindly face. Something, clearly, is wrong - and it is small, and silver, and needle-threader-shaped.`;
      return `The wardrobe department: a long, low, gloriously cluttered room that smells of mothballs, face powder, and glamour gone slightly off. Rails of costumes recede into fragrant gloom; a headless tailor's dummy stands sentinel; a flat-iron heats on its stand.\n\n${tassel}\n\nThe green room is back to the east, and a door opens onto the corridor to the south.`;
    },
    desc_s:()=>`The wardrobe: rails of costumes, headless Deirdre the dummy, a hot iron, ${G.flags.has_costume?'Mrs Tassel beaming over the gown she\'s just fitted to you':G.inv.includes('star_gown')?'Mrs Tassel reaching for the gown to take it in':G.flags.threader_returned?'Mrs Tassel threaded up and ready for Cordelia\'s gown':'Mrs Tassel despairing over a needle she can\'t thread'}. The green room lies east, the corridor south.`,
    exits:{
      east:'green_room',e:'green_room','green room':'green_room','out':'green_room','back':'green_room',
      south:'corridor',s:'corridor',corridor:'corridor',
    },

      rails:ITEMS.costume_rails.desc,
      costumes:ITEMS.costume_rails.desc,

      needle:`A needle, half-threaded and then abandoned in despair on the work-table. Mrs Tassel can no longer get the thread through the eye - "me eyes aren't what they were, love, though don't you dare suggest glasses" - and without her silver needle-threader she's stuck fast, with a costume that needs taking in and no way to do it.`,
      iron:ITEMS.pressing_iron.desc,
      headdresses:`A shelf of ostrich-feather headdresses from some long-ago revue, nodding gently in the draught like a row of very glamorous, very dusty hens. Mrs Tassel keeps meaning to throw them out and never will, because each one was worn by someone she remembers fondly and most of the people she remembers fondly are headdresses now.`,
    },

  },
  stage_door:{
    name:"The Stage Door",
    desc_l:()=>`The stage door: the threshold between the ordinary world and the kingdom of greasepaint, presided over - guarded, more accurately - by Albert, the stage-door keeper, from his little glassed-in lodge.\n\nBehind his counter hangs the key board, every key on its labelled hook, the PROP STORE key gleaming centrally among them. The signing-in book lies open on the counter; his dented tartan flask stands beside it, tragically empty. A cat-flap in the lower door panel admits a draught and, historically, a cat, though no cat has been seen in years.\n\nAlbert regards you over his half-moon spectacles with the warmth of a man who has watched actors come and go for forty years and concluded that the going was generally the better part.\n\nThe corridor leads back west, into the building proper.`,
    desc_s:()=>`Albert's stage-door lodge: the key board (${G.flags.has_prop_key?'prop-store hook now empty':'prop-store key gleaming centrally'}), the signing-in book, his sadly empty flask, a catless cat-flap. The corridor's west.`,
    exits:{
      west:'corridor',w:'corridor',corridor:'corridor','in':'corridor','inside':'corridor','back':'corridor',
    },
    feats:{
      'key board':()=>typeof ITEMS.key_board.desc==='function'?ITEMS.key_board.desc():ITEMS.key_board.desc,
      keys:()=>typeof ITEMS.key_board.desc==='function'?ITEMS.key_board.desc():ITEMS.key_board.desc,
      board:()=>typeof ITEMS.key_board.desc==='function'?ITEMS.key_board.desc():ITEMS.key_board.desc,
      'signing-in book':()=>typeof ITEMS.signing_book.desc==='function'?ITEMS.signing_book.desc():ITEMS.signing_book.desc,
      'signing book':()=>typeof ITEMS.signing_book.desc==='function'?ITEMS.signing_book.desc():ITEMS.signing_book.desc,
      book:()=>typeof ITEMS.signing_book.desc==='function'?ITEMS.signing_book.desc():ITEMS.signing_book.desc,
      flask:ITEMS.keepers_flask.desc,
      thermos:ITEMS.keepers_flask.desc,
      'cat-flap':`A cat-flap set into the lower panel of the stage door, admitting a permanent thin draught and the memory of cats. The last official theatre cat, Albert will tell you if you let him, "had more sense than most of the leading men" and retired to a pub in 1989. Mr Pemberton, the stuffed mascot, is in some sense his successor, which says a great deal about the turnover of cats versus the permanence of taxidermy.`,
      pigeonholes:`A grid of wooden pigeonholes behind the counter, one per company member, for post and messages. Most hold nothing. Yours has never held anything, until tonight, when it holds - you crane to look - a single note in the Stage Manager's hand: "IF VANE'S A NO-SHOW IT'S YOU. SORRY. GOOD LUCK." The apology, you feel, is the unkindest part.`,
      lodge:`Albert's glassed-in lodge: a kettle (cold), a racing paper folded to the 3:40 at Kempton, a fan heater, and forty years of accumulated grievance against the acting profession, kept at a low simmer. It is the cosiest and most hostile six square feet in the building.`,
    },
    npcs:['keeper']
  },
  box_office:{
    name:"The Box Office",
    desc_l:()=>`The box office, on the public side of the building but reachable backstage through a connecting door - a cramped booth of ticket rolls, a card machine that works on alternate Tuesdays, and a window onto the foyer where, even now, late-comers are being gently refused.\n\n${G.flags.brenda_helped?'Brenda, the box-office manager, works briskly through her seating plan now, the VIP party safely placed and her good humour restored.':'Brenda, the box-office manager, is hunched over a vast seating plan in an attitude of pure suffering, holding it at arm\'s length and then very close, defeated by the small print.'} A mini-fridge hums under the counter. The cash drawer is shut, counted, and watched. A vase of artificial flowers provides the room's single dab of unconvincing cheer.\n\nThe corridor is back through the connecting door, west.`,
    desc_s:()=>`Brenda's box office: the big seating plan she ${G.flags.brenda_helped?'can read again at last':'can\'t read for the small print'}, the humming mini-fridge with its precious milk, the watched cash drawer, a vase of fake flowers. Corridor's west.`,
    exits:{
      west:'corridor',w:'corridor',corridor:'corridor','out':'corridor','back':'corridor','in':'corridor',
    },
    feats:{
      'seating plan':()=>typeof ITEMS.seating_plan.desc==='function'?ITEMS.seating_plan.desc():ITEMS.seating_plan.desc,
      plan:()=>typeof ITEMS.seating_plan.desc==='function'?ITEMS.seating_plan.desc():ITEMS.seating_plan.desc,
      seating:()=>typeof ITEMS.seating_plan.desc==='function'?ITEMS.seating_plan.desc():ITEMS.seating_plan.desc,
      'mini-fridge':()=>typeof ITEMS.mini_fridge.desc==='function'?ITEMS.mini_fridge.desc():ITEMS.mini_fridge.desc,
      fridge:()=>typeof ITEMS.mini_fridge.desc==='function'?ITEMS.mini_fridge.desc():ITEMS.mini_fridge.desc,
      'cash drawer':ITEMS.cash_drawer.desc,
      float:ITEMS.cash_drawer.desc,
      drawer:ITEMS.cash_drawer.desc,
      vase:`A vase of artificial flowers on the counter, dusted weekly by Brenda, who maintains that fake flowers "don't die and don't drop, which is more than you can say for the leading men." They are aggressively, eternally pink.`,
      'ticket roll':`A great roll of tonight's tickets, most of them torn off and gone - it's nearly a full house, a rare and precious thing at the Marwood, which makes the prospect of cancelling the show roughly as appealing to Brenda as personal bankruptcy.`,
      window:`The box-office window onto the foyer, where a damp queue of latecomers is being processed and the front-of-house manager is lying smoothly about the show starting "in just a few minutes." Out there, all is calm. Out there, they have no idea.`,
    },
    npcs:['brenda']
  },
  prop_store:{
    name:"The Prop Store",
    desc_l:()=>`The prop store: a long, deep, cavern of a room behind a heavy locked door, where every object the Marwood Empire has ever pretended with goes to wait for its next cue. Floor-to-ceiling shelves groan with the glorious lumber of a hundred shows - skulls, crowns, rubber daggers, a wooden ham. A property coffin stands upright in one corner; a barrel of wax apples gleams in another. A drawer marked "ELECTRICAL - PROBABLY" rattles with mystery.\n\n${G.flags.prop_store_opened?'And there, on his between-shows shelf, sits Mr Pemberton the mascot, dignified and slightly moth-eaten, exactly where the Director feared he\'d be lost.':''}\n\nThe only way out is back west to the corridor.`,
    desc_s:`The prop store: shelves of theatrical lumber, a coffin, a barrel of fake apples, the electrical drawer, and Mr Pemberton on his shelf. Corridor's west.`,
    exits:{

      cat:()=>G.inv.includes('mascot')?'You\'re already carrying Mr Pemberton.':G.flags.has_book?'Mr Pemberton has been safely returned to the Director.':'Mr Pemberton the mascot sits on his shelf, awaiting rescue. TAKE PEMBERTON.',

    },

  diva_room:{
    name:"Miss Vane's Dressing Room",
    desc_l:()=>`The star dressing room: everything yours is not. Spacious, warm, lit by a mirror whose bulbs all work, hung with a gold star on the door and fifteen years of Cordelia Vane on the walls. A red velvet chaise. A dressing table crowded with powders and a half-written note. And on a rail against the wall, secured by a somewhat flimsy-looking padlock, hangs the gown of the leading lady herself - a costume you're almost certainly going to need to put on before you head on stage. The air is thick with her scent - tuberose and cigarettes and something underneath that you only now identify as fear.\n\n${G.flags.knows_vane_hiding?'And Cordelia herself is here: not vanished, not abducted, but folded into the corner of the chaise in her dressing gown, very small, her great dark eyes fixed on you.':'The room is empty - but the still-warm dent in the chaise, and the half-finished note, tell you that wherever the leading lady is, she was here moments ago, and may not be far.'}\n\nThe corridor lies back through the door, west.`,
    desc_s:()=>`Miss Vane's star dressing room: chaise, a wall of her own photographs, the star gown padlocked to a rail (you'll need it on stage), a half-written note. ${G.flags.knows_vane_hiding?'Cordelia is folded into the corner of the chaise, watching you.':'Empty - but the warm chaise says she was here moments ago.'} Corridor's west.`,
    exits:{
      west:'corridor',w:'corridor',corridor:'corridor','out':'corridor','back':'corridor','leave':'corridor',
    },
    feats:{
      chaise:ITEMS.star_chaise.desc,
      'wall of photographs':ITEMS.vane_photos.desc,
      photographs:ITEMS.vane_photos.desc,
      photos:ITEMS.vane_photos.desc,
      costume:()=>typeof ITEMS.locked_costume.desc==='function'?ITEMS.locked_costume.desc():ITEMS.locked_costume.desc,
      gown:()=>typeof ITEMS.locked_costume.desc==='function'?ITEMS.locked_costume.desc():ITEMS.locked_costume.desc,
      rail:()=>typeof ITEMS.locked_costume.desc==='function'?ITEMS.locked_costume.desc():ITEMS.locked_costume.desc,
      'note':ITEMS.half_note.desc,
      'half-written note':ITEMS.half_note.desc,
      'dressing table':`Cordelia's dressing table, a glorious clutter of greasepaints, powders, a silver-backed brush, a cut-glass scent bottle, and the half-written note weighted under a powder compact. Everything here is better than yours, except the note, which is the saddest thing you've read all night.`,
      star:`The gold star on the door - a real one, screwed on, not the stick-on kind. Fifteen years she's had the star on this door. The thought of someone else's name going up, you realise, may be precisely what has frightened her into hiding.`,
      perfume:`The scent bottle: tuberose, heavy and grand and unmistakably hers. Generations of audiences have caught a drift of it from the front row and known the star had arrived. Underneath the perfume tonight, though, is the sharp animal smell of stage fright, which no scent in the world quite covers.`,
    },
    npcs:['vane']
  },
  lighting_box:{
    name:"The Lighting Box",
    desc_l:()=>`Up the iron ladder to the lighting box, a cramped eyrie high at the back of the auditorium with a window looking down over the whole house. This is where the show is lit, where one person in the dark decides what eight hundred people are allowed to see.\n\nThe lighting board fills one wall: rows of dimmer levers, ${G.flags.lights_fixed?'alive now and glowing, every indicator lit':'every one of them dead and dark'}. The great follow-spot sits on its swivel by the window, ${G.flags.lights_fixed?'humming and ready':'cold'}. The operator's stool is empty - whoever should be running lights tonight is nowhere to be found, which in the current crisis is just one more thing.\n\nThe ladder leads back down to the wings.`,
    desc_s:()=>`The lighting box, high over the house. The board (${G.flags.lights_fixed?'alive and glowing':'dead and dark'}), the follow-spot, the empty operator's stool, the god's-eye window over the auditorium. The ladder's down.`,
    exits:{
      down:'wings',d:'wings',ladder:'wings',wings:'wings','back':'wings','climb down':'wings',
    },
    feats:{
      'lighting board':()=>typeof ITEMS.lighting_board.desc==='function'?ITEMS.lighting_board.desc():ITEMS.lighting_board.desc,
      board:()=>typeof ITEMS.lighting_board.desc==='function'?ITEMS.lighting_board.desc():ITEMS.lighting_board.desc,
      levers:()=>typeof ITEMS.lighting_board.desc==='function'?ITEMS.lighting_board.desc():ITEMS.lighting_board.desc,
      dimmers:()=>typeof ITEMS.lighting_board.desc==='function'?ITEMS.lighting_board.desc():ITEMS.lighting_board.desc,
      'follow-spot':()=>typeof ITEMS.follow_spot.desc==='function'?ITEMS.follow_spot.desc():ITEMS.follow_spot.desc,
      spot:()=>typeof ITEMS.follow_spot.desc==='function'?ITEMS.follow_spot.desc():ITEMS.follow_spot.desc,
      'fuse holder':()=>typeof ITEMS.lighting_board.desc==='function'?ITEMS.lighting_board.desc():ITEMS.lighting_board.desc,
      window:ITEMS.gallery_window.desc,
      stool:`The light operator's stool, empty, a cardigan over the back of it and a half-drunk thermos beside it, as if its owner stepped out for a moment two hours ago and walked into the sea. Nobody knows where Kevin from lighting has gone. There is always, somewhere in every theatre, a missing Kevin.`,
      thermos:`A thermos of cold tea abandoned by the absent Kevin. You do not drink another man's abandoned thermos tea. There are depths to which even a desperate understudy will not sink.`,
      graffiti:`The walls of the lighting box, like the walls of every lighting box since the invention of the lighting box, are a palimpsest of crew graffiti: "TONY WOZ ERE 1987", a startlingly good biro sketch of the leading man as a startled owl, a tally of performances scratched into the paint that stops, ominously, mid-stroke, and the eternal backstage koan: "IF IT'S TOO LOUD YOU'RE TOO OLD - SEE THE SOUND DESK FOR DETAILS." You add nothing. Some walls have said enough.`,
      cue_sheet:`A laminated cue sheet taped beside the board, Kevin's hieroglyphics in four colours of highlighter: "LX 14 - SLOW BUILD - DON'T RUSH IT KEVIN", "FOLLOW SPOT: FIND HER, HOLD HER, LOVE HER", and at the bottom, underlined three times, "REMEMBER THE FUSE." Too late for that last one, Kevin. Far too late.`,
    },
    npcs:[]
  },
  director_office:{
    name:"The Director's Office",
    desc_l:()=>`Up a short flight from the corridor, the Director's office: part workplace, part shrine, part field hospital. The walls are papered with posters of his better days; a framed review hangs in baffling pride of place. A cardboard model of tonight's set sits on a side table, one little figure turned pointedly away.\n\nMr Bellweather himself is collapsed across his cluttered desk amid a wreckage of cold tea and a telephone left off the hook. ${G.flags.has_book?'He is calmer now - hollowed out, but calmer - and the Book is no longer clutched to his chest.':'Clutched to his chest, white-knuckled, is the annotated Book: the one complete copy of the play, and your only hope of knowing Act Three. He will not, in his current state, be parted from it. He needs steadying first.'}\n\nThe corridor is back down the steps.`,
    desc_s:()=>`The Director's office-cum-shrine: posters of past glories, that framed savage review, the set model, and Mr Bellweather ${G.flags.has_book?'hollowed-out but calm at last':'collapsed over his desk, clutching the precious Book'}. The corridor's down the steps.`,
    exits:{
      down:'corridor',d:'corridor',corridor:'corridor','out':'corridor','back':'corridor','downstairs':'corridor',
    },
    feats:{
      desk:()=>typeof ITEMS.director_desk.desc==='function'?ITEMS.director_desk.desc():ITEMS.director_desk.desc,
      'the book':()=>typeof ITEMS.director_desk.desc==='function'?ITEMS.director_desk.desc():ITEMS.director_desk.desc,
      posters:ITEMS.glory_posters.desc,
      'past glories':ITEMS.glory_posters.desc,
      review:ITEMS.scathing_review.desc,
      'framed review':ITEMS.scathing_review.desc,
      model:ITEMS.set_model.desc,
      'set model':ITEMS.set_model.desc,
      telephone:`The telephone, off its hook and forgotten, a tinny voice still issuing from the earpiece at intervals - "Hello? Mr Bellweather? Are you - hello?" It is, you gather, the regional newspaper, ringing to ask whether it's true the gala is in trouble. Nobody has had the heart, or the nerve, to answer.`,
      phone:`The telephone, off its hook and forgotten, a tinny voice still issuing from the earpiece - the local paper, smelling a story. Best left exactly where it is.`,
      decanter:`A decanter of something amber and medicinal on the desk, and a single smeared glass. The Director's "nerve tonic". He has not, you note with relief, actually drunk any; he has merely been holding it, for the comfort of having it to hand. Even his despair is, at heart, theatrical.`,
    },
